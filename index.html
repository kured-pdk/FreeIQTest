<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Comprehensive Cognitive Battery | Clinical Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    :root {
      --clinical-blue: #4A6FA5;
      --clinical-slate: #3E4E5F;
      --clinical-light: #F0F4F8;
      --clinical-accent: #5B8CBF;
      --clinical-success: #5D9B7C;
      --clinical-warning: #C49B5C;
      --clinical-danger: #B85C5C;
      --clinical-dark: #1E2A36;
    }
    * {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #E8EDF3;
      min-height: 100vh;
    }
    .clinical-card {
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(30, 42, 54, 0.08), 0 1px 4px rgba(30, 42, 54, 0.04);
      border: 1px solid #E2E8F0;
    }
    .progress-bar-fill {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, #4A6FA5 0%, #5B8CBF 50%, #6DA3D4 100%);
      box-shadow: 0 0 12px rgba(74, 111, 165, 0.3);
    }
    .btn-primary {
      background: linear-gradient(135deg, #4A6FA5 0%, #3D5D8A 100%);
      color: #FFF;
      font-weight: 600;
      border-radius: 10px;
      padding: 12px 28px;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(74, 111, 165, 0.25);
      border: none;
      cursor: pointer;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(74, 111, 165, 0.35);
      background: linear-gradient(135deg, #5B8CBF 0%, #4A6FA5 100%);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(74, 111, 165, 0.3);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-outline {
      background: #FFF;
      color: #3D5D8A;
      font-weight: 600;
      border-radius: 10px;
      padding: 10px 22px;
      border: 2px solid #D0D8E4;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-outline:hover {
      border-color: #4A6FA5;
      background: #F8FAFC;
    }
    .corsi-cell {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 2.5px solid #D0D8E4;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #B0BEC5;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .corsi-cell.flash {
      background: #4A6FA5 !important;
      border-color: #3D5D8A !important;
      color: #FFF !important;
      box-shadow: 0 0 20px rgba(74, 111, 165, 0.6);
      transform: scale(1.04);
      animation: pulseFlash 0.45s ease-out;
    }
    .corsi-cell.user-selected {
      background: #5D9B7C !important;
      border-color: #4A7D63 !important;
      color: #FFF !important;
      box-shadow: 0 0 14px rgba(93, 155, 124, 0.5);
    }
    .corsi-cell.user-error {
      background: #B85C5C !important;
      border-color: #9B4A4A !important;
      color: #FFF !important;
      animation: shake 0.5s ease;
    }
    @keyframes pulseFlash {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(74, 111, 165, 0); }
      40% { transform: scale(1.08); box-shadow: 0 0 28px rgba(74, 111, 165, 0.7); }
      100% { transform: scale(1.04); box-shadow: 0 0 20px rgba(74, 111, 165, 0.6); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.4s ease-out forwards;
    }
    .matrix-option {
      cursor: pointer;
      border-radius: 12px;
      border: 3px solid transparent;
      transition: all 0.2s ease;
      background: #FFF;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .matrix-option:hover {
      border-color: #5B8CBF;
      box-shadow: 0 4px 16px rgba(91, 140, 191, 0.2);
      transform: translateY(-2px);
    }
    .matrix-option.selected {
      border-color: #4A6FA5 !important;
      box-shadow: 0 0 0 4px rgba(74, 111, 165, 0.2) !important;
      background: #F0F4F8 !important;
    }
    .matrix-option.correct-flash {
      border-color: #5D9B7C !important;
      box-shadow: 0 0 0 6px rgba(93, 155, 124, 0.3) !important;
      background: #EDF7F2 !important;
    }
    .matrix-option.incorrect-flash {
      border-color: #B85C5C !important;
      box-shadow: 0 0 0 6px rgba(184, 92, 92, 0.3) !important;
      background: #FDF2F2 !important;
    }
    .timer-ring {
      transition: stroke-dashoffset 1s linear;
    }
    .iq-bar-fill {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
      border-radius: 8px;
    }
    .option-svg-container {
      width: 100%;
      max-width: 100px;
      margin: 0 auto;
    }
    @media (max-width: 640px) {
      .option-svg-container {
        max-width: 80px;
      }
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

  <!-- Top Progress Bar -->
  <div class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-2 flex items-center gap-3">
      <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap">Progress</span>
      <div class="flex-1 h-3 bg-gray-200 rounded-full overflow-hidden">
        <div id="globalProgressBar" class="progress-bar-fill h-full rounded-full" style="width: 0%;"></div>
      </div>
      <span id="progressLabel" class="text-xs font-bold text-gray-600 whitespace-nowrap">0%</span>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="appContainer" class="w-full max-w-2xl mt-16 clinical-card p-4 sm:p-8 animate-in">
    <!-- Content rendered dynamically -->
  </div>

  <!-- Footer -->
  <div class="max-w-2xl w-full mt-3 text-center text-xs text-gray-400">
    <i class="fas fa-shield-alt mr-1"></i> Zero data transmission · 100% client-side · COPPA/GDPR-K compliant
  </div>

  <script>
    (function() {
      // ──────────────────────────────────────
      // STATE MACHINE
      // ──────────────────────────────────────
      const STATE = {
        INIT: 'init',
        PHASE1: 'phase1',
        PHASE2: 'phase2',
        PHASE3: 'phase3',
        PHASE4: 'phase4',
        PHASE5: 'phase5',
        RESULTS: 'results',
      };

      const app = {
        currentState: STATE.INIT,
        chronologicalAge: null,

        phase1: {
          difficulty: 5, consecutiveCorrect: 0, consecutiveWrong: 0,
          questionsAnswered: 0, maxQuestions: 20, correctCount: 0,
          currentQuestion: null, answerSelected: false, totalDifficultySum: 0,
          currentStreak: 0, maxStreak: 0
        },
        phase2: {
          difficulty: 5, consecutiveCorrect: 0, consecutiveWrong: 0,
          questionsAnswered: 0, maxQuestions: 25, correctCount: 0,
          currentQuestion: null, answerSelected: false, totalDifficultySum: 0,
          currentStreak: 0, maxStreak: 0
        },
        phase3: {
          currentSpan: 3, sequence: [], userSequence: [],
          isFlashing: false, isAcceptingInput: false, failuresAtCurrentSpan: 0,
          maxSpanAchieved: 2, phaseComplete: false, flashIndex: 0, totalAttempts: 0,
          correctCount: 0, currentStreak: 0, maxStreak: 0
        },
        phase4: {
          currentSpan: 3, sequence: [], userSequence: [],
          isFlashing: false, isAcceptingInput: false, failuresAtCurrentSpan: 0,
          maxSpanAchieved: 2, phaseComplete: false, flashIndex: 0, totalAttempts: 0,
          correctCount: 0, currentStreak: 0, maxStreak: 0
        },
        phase5: {
          timeRemaining: 60, totalTime: 60, score: 0, trialsCompleted: 0,
          timerInterval: null, currentTrial: null, phaseActive: false, answerLocked: false,
          correctCount: 0, currentStreak: 0, maxStreak: 0
        },
        results: {
          gqScore: 0, gfScore: 0, gwmScore: 0, gsScore: 0, cai: 0, classification: '', ci: 0,
          consistency1: 0, consistency2: 0, consistency3: 0, consistency5: 0
        },
      };

      const appContainer = document.getElementById('appContainer');
      const globalProgressBar = document.getElementById('globalProgressBar');
      const progressLabel = document.getElementById('progressLabel');

      function updateProgress(percentage) {
        const pct = Math.min(100, Math.max(0, Math.round(percentage)));
        globalProgressBar.style.width = pct + '%';
        progressLabel.textContent = pct + '%';
      }

      function render(html) {
        appContainer.innerHTML = html;
        appContainer.classList.remove('animate-in');
        void appContainer.offsetWidth;
        appContainer.classList.add('animate-in');
      }

      // ──────────────────────────────────────
      // PHASE 0: INITIALIZATION
      // ──────────────────────────────────────
      function renderInit() {
        updateProgress(0);
        render(`
          <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 mb-4">
              <i class="fas fa-brain text-3xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Cognitive Ability Screener</h1>
            <p class="text-sm text-gray-500 mb-6">Algorithmically adaptive cognitive estimation</p>
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-left text-sm text-amber-800">
              <p class="font-semibold mb-1"><i class="fas fa-lock mr-1"></i> Privacy Assurance</p>
              <p class="text-xs">This assessment runs entirely within your browser. <strong>Zero data</strong> is collected, transmitted, or stored externally. Fully compliant with COPPA and GDPR-K regulations. No account required.</p>
            </div>
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-6">
              <label for="ageInput" class="block text-sm font-semibold text-gray-700 mb-2">
                <i class="fas fa-calendar-alt mr-1 text-blue-500"></i> Chronological Age (Years)
              </label>
              <input type="number" id="ageInput" min="12" max="99" value="25"
              class="w-full max-w-xs mx-auto block text-center text-xl font-bold border-2 border-gray-300 rounded-xl py-3 px-4 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all"
              placeholder="12-99">
              <p class="text-xs text-gray-400 mt-2">Required for accurate demographic age-norming mapping</p>
            </div>
            <button id="btnStartAssessment" class="btn-primary text-lg px-10 py-4">
              <i class="fas fa-play mr-2"></i> Initialize Assessment
            </button>
          </div>
        `);
        
        document.getElementById('btnStartAssessment').addEventListener('click', () => {
          const ageInput = document.getElementById('ageInput');
          const age = parseInt(ageInput.value);
          if (isNaN(age) || age < 12 || age > 99) {
            ageInput.classList.add('border-red-500', 'ring-4', 'ring-red-100');
            ageInput.focus();
            setTimeout(() => ageInput.classList.remove('border-red-500', 'ring-4', 'ring-red-100'), 1500);
            return;
          }
          app.chronologicalAge = age;
          startPhase1();
        });
      }

      // ──────────────────────────────────────
      // PHASE 1: QUANTITATIVE REASONING (Gq)
      // ──────────────────────────────────────
      function startPhase1() {
        app.currentState = STATE.PHASE1;
        app.phase1.difficulty = Math.min(10, Math.max(1, Math.round(app.chronologicalAge / 3.5)));
        app.phase1.consecutiveCorrect = 0; 
        app.phase1.consecutiveWrong = 0;
        app.phase1.questionsAnswered = 0; 
        app.phase1.correctCount = 0; 
        app.phase1.totalDifficultySum = 0;
        app.phase1.answerSelected = false;
        app.phase1.currentStreak = 0;
        app.phase1.maxStreak = 0;
        generatePhase1Question();
        renderPhase1();
      }

      function generatePhase1Question() {
        const diff = app.phase1.difficulty;
        const patternType = diff <= 3 ? 'arithmetic' : diff <= 6 ? 'geometric' : diff <= 8 ? 'alternating' : 'complex';
        let sequence = [], correctAnswer = 0;
        const len = 5 + Math.floor(diff / 2);
        
        if (patternType === 'arithmetic') {
          const start = Math.floor(Math.random() * 15 * diff) + 2;
          const step = Math.floor(Math.random() * (diff + 2)) + 1;
          for (let i = 0; i < len; i++) sequence.push(start + step * i);
          correctAnswer = sequence[sequence.length - 1] + step;
        } else if (patternType === 'geometric') {
          const start = Math.floor(Math.random() * 5) + 2;
          const ratio = Math.floor(Math.random() * 2) + 2;
          for (let i = 0; i < len; i++) sequence.push(start * Math.pow(ratio, i));
          correctAnswer = sequence[sequence.length - 1] * ratio;
        } else if (patternType === 'alternating') {
          const a1 = Math.floor(Math.random() * 10) + 3, d1 = Math.floor(Math.random() * (diff + 1)) + 2;
          const a2 = Math.floor(Math.random() * 20) + 5, d2 = Math.floor(Math.random() * (diff + 1)) + 1;
          for (let i = 0; i < len; i++) sequence.push(i % 2 === 0 ? a1 + Math.floor(i / 2) * d1 : a2 + Math.floor(i / 2) * d2);
          const nextIdx = len;
          correctAnswer = nextIdx % 2 === 0 ? a1 + Math.floor(nextIdx / 2) * d1 : a2 + Math.floor(nextIdx / 2) * d2;
        } else {
          const base = Math.floor(Math.random() * 8 * diff) + 5, mod = Math.floor(Math.random() * (diff + 3)) + 2;
          for (let i = 0; i < len; i++) sequence.push(base + i * mod + (i % 3 === 0 ? mod : 0));
          correctAnswer = sequence[sequence.length - 1] + mod + ((len % 3 === 0) ? mod : 0);
        }
        
        const distractors = new Set([correctAnswer, correctAnswer + 1, correctAnswer - 1, Math.round(correctAnswer * 0.85), Math.round(correctAnswer * 1.15)]);
        const options = [correctAnswer, ...Array.from(distractors).filter(d => d !== correctAnswer && d > 0).slice(0, 3)];
        shuffleArray(options);
        
        app.phase1.currentQuestion = {
          sequence, correctAnswer, options, correctIndex: options.indexOf(correctAnswer), difficulty: diff, patternType,
        };
        app.phase1.answerSelected = false;
      }

      function renderPhase1() {
        const q = app.phase1.currentQuestion;
        updateProgress(5 + Math.round((app.phase1.questionsAnswered / app.phase1.maxQuestions) * 20));
        
        const optionsHTML = q.options.map((opt, idx) => `
          <button class="w-full py-3 px-4 rounded-xl border-2 border-gray-200 bg-white hover:border-blue-400 hover:bg-blue-50 transition-all font-semibold text-lg text-gray-700 option-btn"
            data-option-index="${idx}" id="optBtn${idx}">${opt}</button>
        `).join('');
        
        render(`
          <div>
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700"><i class="fas fa-calculator mr-1"></i> Phase 1: Quantitative Reasoning</span>
              <span class="text-xs text-gray-400">Question ${app.phase1.questionsAnswered + 1} of ${app.phase1.maxQuestions}</span>
              <span class="text-xs text-gray-400">Difficulty: ${'●'.repeat(q.difficulty)}${'○'.repeat(10-q.difficulty)}</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-5 mb-5 border border-gray-200">
              <p class="text-sm text-gray-500 mb-2 font-medium">Find the next number in the sequence:</p>
              <p class="text-2xl font-bold text-gray-800 tracking-wide font-mono text-center">${q.sequence.join(', ')}, <span class="text-blue-600 underline decoration-2 underline-offset-4">?</span></p>
            </div>
            <div class="grid grid-cols-2 gap-3" id="optionsGrid">${optionsHTML}</div>
            <div id="feedbackArea" class="mt-4 text-center min-h-[2rem]"></div>
          </div>
        `);
        
        document.querySelectorAll('.option-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            if (app.phase1.answerSelected) return;
            app.phase1.answerSelected = true;
            
            const selectedIndex = parseInt(this.getAttribute('data-option-index'));
            const isCorrect = selectedIndex === q.correctIndex;
            
            document.getElementById('optBtn' + q.correctIndex).classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            if (!isCorrect) {
              this.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
            }
            
            if (isCorrect) {
              app.phase1.correctCount++; 
              app.phase1.consecutiveCorrect++; 
              app.phase1.consecutiveWrong = 0; 
              app.phase1.totalDifficultySum += q.difficulty;
              
              app.phase1.currentStreak++;
              if (app.phase1.currentStreak > app.phase1.maxStreak) app.phase1.maxStreak = app.phase1.currentStreak;
              
              document.getElementById('feedbackArea').innerHTML = '<span class="text-green-600 font-semibold"><i class="fas fa-check-circle"></i> Correct!</span>';
              if (app.phase1.consecutiveCorrect >= 2 && app.phase1.difficulty < 10) { 
                app.phase1.difficulty++; 
                app.phase1.consecutiveCorrect = 0; 
              }
            } else {
              app.phase1.consecutiveWrong++; 
              app.phase1.consecutiveCorrect = 0; 
              app.phase1.currentStreak = 0;
              
              document.getElementById('feedbackArea').innerHTML = `<span class="text-red-600 font-semibold"><i class="fas fa-times-circle"></i> Incorrect. Answer: ${q.correctAnswer}</span>`;
              if (app.phase1.consecutiveWrong >= 2 && app.phase1.difficulty > 1) { 
                app.phase1.difficulty--; 
                app.phase1.consecutiveWrong = 0; 
              }
            }
            
            app.phase1.questionsAnswered++;
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            
            setTimeout(() => {
              if (app.phase1.questionsAnswered >= app.phase1.maxQuestions) { finishPhase1(); }
              else { generatePhase1Question(); renderPhase1(); }
            }, 900);
          });
        });
      }

      function finishPhase1() { 
        updateProgress(25); 
        startPhase2(); 
      }

      // ──────────────────────────────────────
      // PHASE 2: FLUID SPATIAL LOGIC (Gf)
      // ──────────────────────────────────────
      function startPhase2() {
        app.currentState = STATE.PHASE2;
        app.phase2.difficulty = Math.min(10, Math.max(1, Math.round(app.chronologicalAge / 3.5)));
        app.phase2.consecutiveCorrect = 0; 
        app.phase2.consecutiveWrong = 0;
        app.phase2.questionsAnswered = 0; 
        app.phase2.correctCount = 0; 
        app.phase2.totalDifficultySum = 0;
        app.phase2.answerSelected = false;
        app.phase2.currentStreak = 0;
        app.phase2.maxStreak = 0;
        generatePhase2Question();
        renderPhase2();
      }

      function generateSingleShapeSVG(shapeObj, size = 80) {
        const { shape, color, rotation } = shapeObj;
        const cx = size/2, cy = size/2, r = size * 0.35;
        let shapeCode = '';
        switch (shape) {
          case 'circle': shapeCode = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" transform="rotate(${rotation}, ${cx}, ${cy})"/>`; break;
          case 'square': shapeCode = `<rect x="${cx - r}" y="${cy - r}" width="${r*2}" height="${r*2}" fill="${color}" rx="3" transform="rotate(${rotation}, ${cx}, ${cy})"/>`; break;
          case 'triangle': const tp = `${cx},${cy - r} ${cx - r},${cy + r} ${cx + r},${cy + r}`; shapeCode = `<polygon points="${tp}" fill="${color}" transform="rotate(${rotation}, ${cx}, ${cy})"/>`; break;
          case 'diamond': const dp = `${cx},${cy - r} ${cx + r},${cy} ${cx},${cy + r} ${cx - r},${cy}`; shapeCode = `<polygon points="${dp}" fill="${color}" transform="rotate(${rotation}, ${cx}, ${cy})"/>`; break;
          case 'star': const sp = []; for (let i=0;i<5;i++) { const a = (i*72-90)*Math.PI/180; sp.push(`${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`); const ai = ((i*72)+36-90)*Math.PI/180; sp.push(`${cx + r*0.4*Math.cos(ai)},${cy + r*0.4*Math.sin(ai)}`); } shapeCode = `<polygon points="${sp.join(' ')}" fill="${color}" transform="rotate(${rotation}, ${cx}, ${cy})"/>`; break;
        }
        return `<svg viewBox="0 0 ${size} ${size}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="#fff" rx="8"/>${shapeCode}</svg>`;
      }

      function generateMatrixSVG(gridData, cellSize = 70, highlightMissing = true) {
        const shapes = gridData;
        let svgContent = '';
        const padding = 5, totalSize = cellSize * 3 + padding * 2;
        for (let row = 0; row < 3; row++) {
          for (let col = 0; col < 3; col++) {
            const x = padding + col * cellSize, y = padding + row * cellSize;
            const cell = shapes[row][col];
            if (cell === null && highlightMissing) {
              svgContent += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="#F0F4F8" stroke="#CBD5E1" stroke-width="2" rx="6" stroke-dasharray="6,3"/><text x="${x+cellSize/2}" y="${y+cellSize/2}" text-anchor="middle" dominant-baseline="central" font-size="28" fill="#94A3B8">?</text>`;
            } else if (cell) {
              svgContent += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" rx="6"/>`;
              const innerSize = cellSize * 0.55, cxCell = x + cellSize/2, cyCell = y + cellSize/2, rInner = innerSize/2;
              switch (cell.shape) {
                case 'circle': svgContent += `<circle cx="${cxCell}" cy="${cyCell}" r="${rInner}" fill="${cell.color}" transform="rotate(${cell.rotation}, ${cxCell}, ${cyCell})"/>`; break;
                case 'square': svgContent += `<rect x="${cxCell - rInner}" y="${cyCell - rInner}" width="${rInner*2}" height="${rInner*2}" fill="${cell.color}" rx="2" transform="rotate(${cell.rotation}, ${cxCell}, ${cyCell})"/>`; break;
                case 'triangle': const tp = `${cxCell},${cyCell - rInner} ${cxCell - rInner},${cyCell + rInner} ${cxCell + rInner},${cyCell + rInner}`; svgContent += `<polygon points="${tp}" fill="${cell.color}" transform="rotate(${cell.rotation}, ${cxCell}, ${cyCell})"/>`; break;
                case 'diamond': const dp = `${cxCell},${cyCell - rInner} ${cxCell + rInner},${cyCell} ${cxCell},${cyCell + rInner} ${cxCell - rInner},${cyCell}`; svgContent += `<polygon points="${dp}" fill="${cell.color}" transform="rotate(${cell.rotation}, ${cxCell}, ${cyCell})"/>`; break;
                case 'star': const sp = []; for (let i=0;i<5;i++) { const a=(i*72-90)*Math.PI/180; sp.push(`${cxCell + rInner*Math.cos(a)},${cyCell + rInner*Math.sin(a)}`); const ai=((i*72)+36-90)*Math.PI/180; sp.push(`${cxCell + rInner*0.4*Math.cos(ai)},${cyCell + rInner*0.4*Math.sin(ai)}`); } svgContent += `<polygon points="${sp.join(' ')}" fill="${cell.color}" transform="rotate(${cell.rotation}, ${cxCell}, ${cyCell})"/>`; break;
              }
            }
          }
        }
        return `<svg viewBox="0 0 ${totalSize} ${totalSize}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">${svgContent}</svg>`;
      }

      function generatePhase2Question() {
        const diff = app.phase2.difficulty;
        const shapes = ['circle', 'square', 'triangle', 'diamond', 'star'];
        const colors = ['#4A6FA5', '#B85C5C', '#5D9B7C', '#C49B5C', '#7B5EA7', '#D4756B', '#5B8CBF', '#E89B53'];
        const rotations = [0, 45, 90, 135, 180, 225, 270, 315];
        
        const baseShape = shapes[Math.floor(Math.random() * shapes.length)];
        const baseColor = colors[Math.floor(Math.random() * colors.length)];
        // Safeguard to guarantee rotation step mapping stays within bounds
        const rotStep = rotations[Math.min(diff, rotations.length - 1)];
        
        const grid = [];
        for (let r = 0; r < 3; r++) {
          grid[r] = [];
          for (let c = 0; c < 3; c++) {
            if (r === 2 && c === 2) {
              grid[r][c] = null; 
            } else {
              const shapeIdx = (shapes.indexOf(baseShape) + r + c) % shapes.length;
              const colorIdx = (colors.indexOf(baseColor) + r + c) % colors.length;
              grid[r][c] = {
                shape: shapes[shapeIdx],
                color: colors[colorIdx],
                rotation: ((r + c) * rotStep) % 360
              };
            }
          }
        }
        
        const correctShapeIdx = (shapes.indexOf(baseShape) + 4) % shapes.length;
        const correctColorIdx = (colors.indexOf(baseColor) + 4) % colors.length;
        const correctAnswer = {
          shape: shapes[correctShapeIdx],
          color: colors[correctColorIdx],
          rotation: (4 * rotStep) % 360
        };
        
        const distractorSet = new Set();
        const key = (s) => `${s.shape}|${s.color}|${s.rotation}`;
        distractorSet.add(key(correctAnswer));
        
        while (distractorSet.size < 4) {
          const candidate = {
            shape: shapes[Math.floor(Math.random() * shapes.length)],
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: rotations[Math.floor(Math.random() * rotations.length)]
          };
          const cKey = key(candidate);
          if (!distractorSet.has(cKey)) {
            distractorSet.add(cKey);
          }
        }
        
        const allOptions = [
          correctAnswer,
          ...Array.from(distractorSet)
            .filter(k => k !== key(correctAnswer))
            .map(k => {
              const [shape, color, rotation] = k.split('|');
              return { shape, color, rotation: parseInt(rotation) };
            })
        ];
        shuffleArray(allOptions);
        
        const correctIndex = allOptions.findIndex(
          opt => opt.shape === correctAnswer.shape &&
                 opt.color === correctAnswer.color &&
                 opt.rotation === correctAnswer.rotation
        );
        
        app.phase2.currentQuestion = {
          grid,
          options: allOptions,
          correctIndex,
          difficulty: diff,
        };
        app.phase2.answerSelected = false;
      }

      function renderPhase2() {
        const q = app.phase2.currentQuestion;
        updateProgress(25 + Math.round((app.phase2.questionsAnswered / app.phase2.maxQuestions) * 20));
        
        const matrixSVG = generateMatrixSVG(q.grid, 68, true);
        const optionsHTML = q.options.map((opt, idx) => {
          const singleSVG = generateSingleShapeSVG(opt, 80);
          return `
            <div class="matrix-option p-2 flex flex-col items-center gap-1" data-option-index="${idx}" id="matrixOpt${idx}">
              <div class="option-svg-container w-full flex justify-center">${singleSVG}</div>
              <span class="text-xs text-gray-500 font-medium">${idx + 1}</span>
            </div>
          `;
        }).join('');
        
        render(`
          <div>
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-purple-100 text-purple-700"><i class="fas fa-th mr-1"></i> Phase 2: Spatial Logic</span>
              <span class="text-xs text-gray-400">Matrix ${app.phase2.questionsAnswered + 1} of ${app.phase2.maxQuestions}</span>
              <span class="text-xs text-gray-400">Difficulty: ${'●'.repeat(q.difficulty)}${'○'.repeat(10-q.difficulty)}</span>
            </div>
            <p class="text-sm text-gray-600 mb-3">Complete the pattern. Select the missing shape.</p>
            <div class="flex justify-center mb-5 bg-gray-50 rounded-xl p-4 border border-gray-200">
              <div class="w-full max-w-xs">${matrixSVG}</div>
            </div>
            <p class="text-sm text-gray-500 mb-2">Choose the correct shape:</p>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="matrixOptionsGrid">${optionsHTML}</div>
            <div id="feedbackArea2" class="mt-4 text-center min-h-[2rem]"></div>
          </div>
        `);
        
        const optionDivs = document.querySelectorAll('.matrix-option');
        optionDivs.forEach(div => {
          div.addEventListener('click', function() {
            if (app.phase2.answerSelected) return;
            app.phase2.answerSelected = true;
            
            const selectedIndex = parseInt(this.getAttribute('data-option-index'));
            const isCorrect = selectedIndex === q.correctIndex;
            
            document.getElementById('matrixOpt' + q.correctIndex).classList.add('correct-flash');
            if (!isCorrect) {
              this.classList.add('incorrect-flash');
            }
            
            if (isCorrect) {
              app.phase2.correctCount++; 
              app.phase2.consecutiveCorrect++; 
              app.phase2.consecutiveWrong = 0; 
              app.phase2.totalDifficultySum += q.difficulty;
              
              app.phase2.currentStreak++;
              if (app.phase2.currentStreak > app.phase2.maxStreak) app.phase2.maxStreak = app.phase2.currentStreak;
              
              document.getElementById('feedbackArea2').innerHTML = '<span class="text-green-600 font-semibold"><i class="fas fa-check-circle"></i> Correct!</span>';
              if (app.phase2.consecutiveCorrect >= 2 && app.phase2.difficulty < 10) { 
                app.phase2.difficulty++; 
                app.phase2.consecutiveCorrect = 0; 
              }
            } else {
              app.phase2.consecutiveWrong++; 
              app.phase2.consecutiveCorrect = 0; 
              app.phase2.currentStreak = 0;
              
              document.getElementById('feedbackArea2').innerHTML = '<span class="text-red-600 font-semibold"><i class="fas fa-times-circle"></i> Incorrect</span>';
              if (app.phase2.consecutiveWrong >= 2 && app.phase2.difficulty > 1) { 
                app.phase2.difficulty--; 
                app.phase2.consecutiveWrong = 0; 
              }
            }
            
            app.phase2.questionsAnswered++;
            optionDivs.forEach(d => d.style.pointerEvents = 'none');
            
            setTimeout(() => {
              if (app.phase2.questionsAnswered >= app.phase2.maxQuestions) { finishPhase2(); }
              else { generatePhase2Question(); renderPhase2(); }
            }, 800);
          });
        });
      }

      function finishPhase2() { 
        updateProgress(45); 
        startPhase3(); 
      }

      // ──────────────────────────────────────
      // PHASE 3 & 4: WORKING MEMORY (FORWARD & BACKWARD)
      // ──────────────────────────────────────
      function startPhase3() {
        app.currentState = STATE.PHASE3;
        app.phase3.currentSpan = 3; app.phase3.failuresAtCurrentSpan = 0; app.phase3.maxSpanAchieved = 2;
        app.phase3.phaseComplete = false; app.phase3.userSequence = []; app.phase3.isFlashing = false; app.phase3.isAcceptingInput = false;
        app.phase3.correctCount = 0; app.phase3.currentStreak = 0; app.phase3.maxStreak = 0;
        generateCorsiSequence('phase3'); 
        renderPhase3();
      }
      
      function startPhase4() {
        app.currentState = STATE.PHASE4;
        app.phase4.currentSpan = 3; app.phase4.failuresAtCurrentSpan = 0; app.phase4.maxSpanAchieved = 2;
        app.phase4.phaseComplete = false; app.phase4.userSequence = []; app.phase4.isFlashing = false; app.phase4.isAcceptingInput = false;
        app.phase4.correctCount = 0; app.phase4.currentStreak = 0; app.phase4.maxStreak = 0;
        generateCorsiSequence('phase4'); 
        renderPhase4();
      }
      
      function generateCorsiSequence(phaseKey) {
        const phase = app[phaseKey]; 
        const seq = []; 
        const used = new Set();
        for (let i = 0; i < phase.currentSpan; i++) { 
          let cell; 
          do { 
            cell = Math.floor(Math.random() * 9); 
          } while (used.has(cell) && used.size < 9); 
          used.add(cell); 
          seq.push(cell); 
        }
        phase.sequence = seq; 
        phase.userSequence = []; 
        phase.isFlashing = true; 
        phase.isAcceptingInput = false; 
        phase.flashIndex = 0;
      }
      
      function renderCorsiGrid(phaseKey) {
        const phase = app[phaseKey];
        const cellsHTML = Array.from({length:9}, (_,i) => `<div class="corsi-cell" data-cell-index="${i}" id="corsiCell${i}">${i+1}</div>`).join('');
        const phaseLabel = phaseKey === 'phase3' ? 'Forward Working Memory' : 'Backward Working Memory';
        const phaseNum = phaseKey === 'phase3' ? '3' : '4';
        const instruction = phaseKey === 'phase3' ? 'Watch the sequence. Then tap in <strong>same order</strong>.' : 'Watch the sequence. Then tap in <strong>reverse order</strong>.';
        
        updateProgress(phaseKey === 'phase3' ? 45 + Math.min(10, Math.round((phase.maxSpanAchieved - 2) / 7 * 10)) : 55 + Math.min(10, Math.round((phase.maxSpanAchieved - 2) / 7 * 10)));
        
        return `
          <div>
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-teal-100 text-teal-700"><i class="fas fa-th-large mr-1"></i> Phase ${phaseNum}: ${phaseLabel}</span>
              <span class="text-xs text-gray-400">Span: ${phase.currentSpan} | Best: ${phase.maxSpanAchieved}</span>
            </div>
            <p class="text-sm text-gray-600 mb-3">${instruction}</p>
            <div class="grid grid-cols-3 gap-2 max-w-sm mx-auto mb-4" id="corsiGridContainer">${cellsHTML}</div>
            <div id="corsiStatus" class="text-center text-sm font-semibold text-gray-500"><i class="fas fa-eye mr-1"></i> Watch carefully...</div>
            <div id="corsiFeedback" class="text-center mt-2 min-h-[1.5rem]"></div>
          </div>
        `;
      }
      
      function renderPhase3() { render(renderCorsiGrid('phase3')); startCorsiFlashing('phase3'); }
      function renderPhase4() { render(renderCorsiGrid('phase4')); startCorsiFlashing('phase4'); }
      
      function startCorsiFlashing(phaseKey) {
        const phase = app[phaseKey]; 
        phase.isFlashing = true; 
        phase.isAcceptingInput = false; 
        phase.flashIndex = 0; 
        phase.userSequence = [];
        
        for (let i = 0; i < 9; i++) { 
          const c = document.getElementById('corsiCell'+i); 
          if(c) {
            c.classList.remove('flash','user-selected','user-error'); 
            c.style.pointerEvents='none';
          } 
        }
        
        function flashNext() {
          if (phase.flashIndex < phase.sequence.length) {
            const cell = document.getElementById('corsiCell'+phase.sequence[phase.flashIndex]);
            if(cell) { 
              cell.classList.add('flash'); 
              document.getElementById('corsiStatus').innerHTML = `<i class="fas fa-eye mr-1"></i> Watch... (${phase.flashIndex+1}/${phase.sequence.length})`; 
            }
            setTimeout(() => { 
              if(cell) cell.classList.remove('flash'); 
              phase.flashIndex++; 
              setTimeout(flashNext, 200); 
            }, 500);
          } else {
            phase.isFlashing = false; 
            phase.isAcceptingInput = true;
            document.getElementById('corsiStatus').innerHTML = '<i class="fas fa-hand-pointer mr-1"></i> Your turn!';
            for (let i = 0; i < 9; i++) { 
              const c = document.getElementById('corsiCell'+i); 
              if(c) c.style.pointerEvents='auto'; 
            }
            setupCorsiClickHandlers(phaseKey);
          }
        }
        setTimeout(flashNext, 400);
      }
      
      function setupCorsiClickHandlers(phaseKey) {
        const phase = app[phaseKey];
        const grid = document.getElementById('corsiGridContainer'); 
        if(!grid) return;
        
        // Prevent event listener memory leaks by cloning the node
        const newGrid = grid.cloneNode(true); 
        grid.parentNode.replaceChild(newGrid, grid);
        
        newGrid.addEventListener('click', function(e) {
          if (!phase.isAcceptingInput || phase.isFlashing) return;
          const cellDiv = e.target.closest('.corsi-cell'); 
          if(!cellDiv) return;
          
          const idx = parseInt(cellDiv.getAttribute('data-cell-index')); 
          if(isNaN(idx) || phase.userSequence.includes(idx)) return;
          
          phase.userSequence.push(idx); 
          cellDiv.classList.add('user-selected');
          
          if (phase.userSequence.length === phase.sequence.length) {
            phase.isAcceptingInput = false;
            const target = phaseKey === 'phase4' ? [...phase.sequence].reverse() : [...phase.sequence];
            const correct = arraysEqual(phase.userSequence, target);
            
            if (correct) {
              phase.maxSpanAchieved = Math.max(phase.maxSpanAchieved, phase.currentSpan); 
              phase.currentSpan++; 
              phase.failuresAtCurrentSpan = 0;
              
              phase.correctCount++;
              phase.currentStreak++;
              if (phase.currentStreak > phase.maxStreak) phase.maxStreak = phase.currentStreak;

              document.getElementById('corsiFeedback').innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-check-circle"></i> Correct! Span increasing.</span>';
            } else {
              phase.failuresAtCurrentSpan++;
              phase.currentStreak = 0;

              phase.userSequence.forEach(i => { 
                const c = document.getElementById('corsiCell'+i); 
                if(c) {
                  c.classList.remove('user-selected'); 
                  c.classList.add('user-error');
                } 
              });
              
              if (phase.failuresAtCurrentSpan >= 2) { 
                phase.phaseComplete = true; 
                document.getElementById('corsiStatus').innerHTML = '<i class="fas fa-flag-checkered"></i> Phase complete.'; 
              } else { 
                document.getElementById('corsiStatus').innerHTML = '<i class="fas fa-redo"></i> Try again.'; 
              }
              document.getElementById('corsiFeedback').innerHTML = '<span class="text-red-600 font-bold"><i class="fas fa-times-circle"></i> Incorrect sequence.</span>';
            }
            
            for (let i = 0; i < 9; i++) { 
              const c = document.getElementById('corsiCell'+i); 
              if(c) c.style.pointerEvents='none'; 
            }
            
            setTimeout(() => {
              if (phase.phaseComplete) {
                if (phaseKey === 'phase3') { 
                  updateProgress(55); 
                  startPhase4(); 
                } else { 
                  updateProgress(65); 
                  startPhase5(); 
                }
              } else { 
                generateCorsiSequence(phaseKey); 
                phaseKey === 'phase3' ? renderPhase3() : renderPhase4(); 
              }
            }, 1200);
          }
        });
      }

      // ──────────────────────────────────────
      // PHASE 5: PROCESSING SPEED (Gs)
      // ──────────────────────────────────────
      function startPhase5() {
        app.currentState = STATE.PHASE5;
        app.phase5.timeRemaining = 60; 
        app.phase5.score = 0; 
        app.phase5.trialsCompleted = 0;
        app.phase5.phaseActive = true; 
        app.phase5.answerLocked = false; 
        app.phase5.timerInterval = null;
        app.phase5.correctCount = 0;
        app.phase5.currentStreak = 0;
        app.phase5.maxStreak = 0;
        
        generatePhase5Trial(); 
        renderPhase5(); 
        startPhase5Timer();
      }
      
      function generatePhase5Trial() {
        const symbols = ['α','β','γ','δ','ε','ζ','η','θ','λ','μ','π','σ','φ','ψ','ω'];
        const target = symbols[Math.floor(Math.random()*symbols.length)];
        const others = symbols.filter(s=>s!==target); 
        shuffleArray(others);
        
        const options = others.slice(0,4);
        const present = Math.random() < 0.5;
        if(present) options[Math.floor(Math.random()*4)] = target;
        
        app.phase5.currentTrial = { target, options, targetPresent: present };
        app.phase5.answerLocked = false;
      }
      
      function renderPhase5() {
        const t = app.phase5.currentTrial;
        const pct = (app.phase5.timeRemaining/60)*100;
        updateProgress(65+Math.round((60-app.phase5.timeRemaining)/60*30));
        
        render(`
          <div>
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-orange-100 text-orange-700"><i class="fas fa-bolt mr-1"></i> Phase 5: Processing Speed</span>
              <span class="text-xs text-gray-400">Score: ${app.phase5.score}</span>
            </div>
            <div class="flex items-center gap-4 mb-4">
              <div class="flex-1 h-4 bg-gray-200 rounded-full">
                <div class="h-full rounded-full" style="width:${pct}%; background:${pct>30?'#5D9B7C':pct>15?'#C49B5C':'#B85C5C'};"></div>
              </div>
              <span class="text-2xl font-bold" id="timerDisplay">${app.phase5.timeRemaining}s</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-5 mb-4 text-center">
              <p class="text-sm text-gray-500">Target:</p>
              <p class="text-5xl font-bold">${t.target}</p>
            </div>
            <div class="flex justify-center gap-2 text-3xl font-bold text-gray-600 bg-white rounded-xl p-4 border flex-wrap">
              ${t.options.map(s=>`<span class="px-2">${s}</span>`).join('<span class="text-gray-300">|</span>')}
            </div>
            <div class="flex gap-3 justify-center mt-5" id="psButtons">
              <button id="btnPresent" class="btn-primary bg-green-600 px-6 py-3">PRESENT</button>
              <button id="btnAbsent" class="btn-primary px-6 py-3" style="background:linear-gradient(135deg,#B85C5C,#9B4A4A);">ABSENT</button>
            </div>
            <div id="psFeedback" class="text-center mt-3 font-semibold min-h-[1.5rem]"></div>
          </div>
        `);
        
        document.getElementById('btnPresent').onclick = () => handlePhase5Answer(true);
        document.getElementById('btnAbsent').onclick = () => handlePhase5Answer(false);
      }
      
      function handlePhase5Answer(userPresent) {
        if(!app.phase5.phaseActive || app.phase5.answerLocked) return;
        app.phase5.answerLocked = true;
        
        const correct = (userPresent === app.phase5.currentTrial.targetPresent);
        app.phase5.score += correct ? 1 : -1; 
        app.phase5.trialsCompleted++;
        
        if (correct) {
          app.phase5.correctCount++;
          app.phase5.currentStreak++;
          if (app.phase5.currentStreak > app.phase5.maxStreak) app.phase5.maxStreak = app.phase5.currentStreak;
        } else {
          app.phase5.currentStreak = 0;
        }
        
        document.getElementById('psFeedback').innerHTML = correct ? '<span class="text-green-600">Correct! +1</span>' : '<span class="text-red-600">Incorrect! -1</span>';
        document.getElementById('btnPresent').disabled = document.getElementById('btnAbsent').disabled = true;
        
        setTimeout(() => { 
          if(app.phase5.phaseActive) { 
            generatePhase5Trial(); 
            renderPhase5(); 
          } 
        }, 350);
      }
      
      function startPhase5Timer() {
        app.phase5.timerInterval = setInterval(() => {
          app.phase5.timeRemaining--;
          const disp = document.getElementById('timerDisplay'); 
          if(disp) disp.textContent = app.phase5.timeRemaining+'s';
          
          updateProgress(65+Math.round((60-app.phase5.timeRemaining)/60*30));
          
          if(app.phase5.timeRemaining <= 0) finishPhase5();
        }, 1000);
      }
      
      function finishPhase5() {
        app.phase5.phaseActive = false; 
        clearInterval(app.phase5.timerInterval);
        updateProgress(100);
        setTimeout(calculateAndRenderResults, 400);
      }

      // ──────────────────────────────────────
      // SCORING & RESULTS
      // ──────────────────────────────────────
      function calculateAndRenderResults() {
        const age = app.chronologicalAge;
        
        // Domain specific age decay formulas (simplification of longitudinal psychometric trajectories)
        const ageFactorGq = 1 - Math.max(0, Math.abs(age - 45) * 0.004); 
        const ageFactorGf = 1 - Math.max(0, (age > 22 ? age - 22 : 22 - age) * 0.015);
        const ageFactorGwm = 1 - Math.max(0, Math.abs(age - 25) * 0.008);
        const ageFactorGs = 1 - Math.max(0, (age > 20 ? age - 20 : 20 - age) * 0.02);

        // Calculate Ability Estimates based on IRT-lite (Average Difficulty Correct * Accuracy Penalty)
        const gqAbility = (app.phase1.correctCount > 0) ? (app.phase1.totalDifficultySum / app.phase1.correctCount) * (app.phase1.correctCount / app.phase1.maxQuestions) : 0;
        const gfAbility = (app.phase2.correctCount > 0) ? (app.phase2.totalDifficultySum / app.phase2.correctCount) * (app.phase2.correctCount / app.phase2.maxQuestions) : 0;
        
        // Z-Scores relative to uncalibrated internal parameters (Normed against age factor)
        const gqZ = (gqAbility - 6.5 * ageFactorGq) / 1.8;
        const gfZ = (gfAbility - 7.0 * ageFactorGf) / 2.0;
        const gwmZ = ((app.phase3.maxSpanAchieved + app.phase4.maxSpanAchieved) - 11.5 * ageFactorGwm) / 2.5;
        const gsZ = (app.phase5.score - 25 * ageFactorGs) / 10;

        const cais = [100 + gqZ * 15, 100 + gfZ * 15, 100 + gwmZ * 15, 100 + gsZ * 15];
        app.results.gqScore = Math.round(cais[0]); 
        app.results.gfScore = Math.round(cais[1]);
        app.results.gwmScore = Math.round(cais[2]); 
        app.results.gsScore = Math.round(cais[3]);
        
        // Global Composite CAI
        app.results.cai = Math.round((app.results.gqScore*0.3) + (app.results.gfScore*0.3) + (app.results.gwmScore*0.25) + (app.results.gsScore*0.15));
        
        // Internal consistency calculation (Max Streak / Total Correct Answers)
        app.results.consistency1 = app.phase1.correctCount > 0 ? Math.round((app.phase1.maxStreak / app.phase1.correctCount) * 100) : 0;
        app.results.consistency2 = app.phase2.correctCount > 0 ? Math.round((app.phase2.maxStreak / app.phase2.correctCount) * 100) : 0;
        app.results.consistency3 = app.phase3.correctCount > 0 ? Math.round((app.phase3.maxStreak / app.phase3.correctCount) * 100) : 0;
        app.results.consistency5 = app.phase5.correctCount > 0 ? Math.round((app.phase5.maxStreak / app.phase5.correctCount) * 100) : 0;

        // General Variance 
        const variance = Math.abs(app.results.gqScore - app.results.gfScore) + Math.abs(app.results.gwmScore - app.results.gsScore);
        app.results.ci = Math.round(Math.max(4, Math.min(12, variance / 4))); 

        app.currentState = STATE.RESULTS;
        renderResults();
      }

      function renderResults() {
        updateProgress(100);
        const r = app.results;
        
        // Helper to color-code consistency metric
        const consistColor = (val) => val >= 60 ? 'text-green-600' : val >= 30 ? 'text-amber-600' : 'text-red-600';
        
        render(`
          <div>
            <div class="text-center mb-6">
              <h2 class="text-lg font-bold uppercase text-gray-500 mb-1">Cognitive Ability Index (CAI)</h2>
              <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 text-white mb-3 shadow-lg">
                <span class="text-4xl font-extrabold">${r.cai}</span>
              </div>
              <p class="text-sm font-semibold text-gray-600">95% Confidence Interval: &plusmn;${r.ci} points</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
              <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between mb-1"><span class="font-semibold text-sm">Gq Index (Quantitative)</span><span class="font-bold">${r.gqScore}</span></div>
                <div class="h-2 bg-gray-200 rounded-full mb-2"><div class="h-full rounded-full bg-blue-500" style="width:${Math.max(5,(r.gqScore/160)*100)}%"></div></div>
                <div class="text-xs text-gray-500 text-right">Reliability Check: <span class="font-semibold ${consistColor(r.consistency1)}">${r.consistency1}%</span></div>
              </div>
              
              <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between mb-1"><span class="font-semibold text-sm">Gf Index (Fluid/Spatial)</span><span class="font-bold">${r.gfScore}</span></div>
                <div class="h-2 bg-gray-200 rounded-full mb-2"><div class="h-full rounded-full bg-purple-500" style="width:${Math.max(5,(r.gfScore/160)*100)}%"></div></div>
                <div class="text-xs text-gray-500 text-right">Reliability Check: <span class="font-semibold ${consistColor(r.consistency2)}">${r.consistency2}%</span></div>
              </div>
              
              <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between mb-1"><span class="font-semibold text-sm">Gwm Index (Memory)</span><span class="font-bold">${r.gwmScore}</span></div>
                <div class="h-2 bg-gray-200 rounded-full mb-2"><div class="h-full rounded-full bg-teal-500" style="width:${Math.max(5,(r.gwmScore/160)*100)}%"></div></div>
                <div class="text-xs text-gray-500 text-right">Reliability Check: <span class="font-semibold ${consistColor(r.consistency3)}">${r.consistency3}%</span></div>
              </div>
              
              <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between mb-1"><span class="font-semibold text-sm">Gs Index (Processing)</span><span class="font-bold">${r.gsScore}</span></div>
                <div class="h-2 bg-gray-200 rounded-full mb-2"><div class="h-full rounded-full bg-orange-500" style="width:${Math.max(5,(r.gsScore/160)*100)}%"></div></div>
                <div class="text-xs text-gray-500 text-right">Reliability Check: <span class="font-semibold ${consistColor(r.consistency5)}">${r.consistency5}%</span></div>
              </div>
            </div>
            
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-4 text-xs text-slate-700">
              <p class="font-semibold mb-1">Methodology Note</p>
              <p>Scores are derived using item response difficulty weighting and domain-specific age decay formulas mapped to chronologic base data. This represents an internally referenced percentile approximation, not a diagnostic clinical IQ score.</p>
            </div>
            
            <div class="text-center">
              <button id="btnRestart" class="btn-outline px-6 py-3"><i class="fas fa-redo"></i> Restart Assessment</button>
            </div>
          </div>
        `);
        
        document.getElementById('btnRestart').onclick = () => { 
          resetApp(); 
          renderInit(); 
        };
      }

      function shuffleArray(arr) { 
        for (let i = arr.length - 1; i > 0; i--) { 
          const j = Math.floor(Math.random() * (i + 1)); 
          [arr[i], arr[j]] = [arr[j], arr[i]]; 
        } 
      }
      
      function arraysEqual(a, b) { 
        return a.length === b.length && a.every((v, i) => v === b[i]); 
      }
      
      function resetApp() {
        clearInterval(app.phase5.timerInterval);
        app.phase1 = { difficulty:5, consecutiveCorrect:0, consecutiveWrong:0, questionsAnswered:0, maxQuestions:20, correctCount:0, currentQuestion:null, answerSelected:false, totalDifficultySum:0, currentStreak:0, maxStreak:0 };
        app.phase2 = { difficulty:5, consecutiveCorrect:0, consecutiveWrong:0, questionsAnswered:0, maxQuestions:25, correctCount:0, currentQuestion:null, answerSelected:false, totalDifficultySum:0, currentStreak:0, maxStreak:0 };
        app.phase3 = { currentSpan:3, sequence:[], userSequence:[], isFlashing:false, isAcceptingInput:false, failuresAtCurrentSpan:0, maxSpanAchieved:2, phaseComplete:false, flashIndex:0, totalAttempts:0, correctCount:0, currentStreak:0, maxStreak:0 };
        app.phase4 = { currentSpan:3, sequence:[], userSequence:[], isFlashing:false, isAcceptingInput:false, failuresAtCurrentSpan:0, maxSpanAchieved:2, phaseComplete:false, flashIndex:0, totalAttempts:0, correctCount:0, currentStreak:0, maxStreak:0 };
        app.phase5 = { timeRemaining:60, totalTime:60, score:0, trialsCompleted:0, timerInterval:null, currentTrial:null, phaseActive:false, answerLocked:false, correctCount:0, currentStreak:0, maxStreak:0 };
        app.results = { gqScore:0, gfScore:0, gwmScore:0, gsScore:0, cai:0, classification:'', ci:0, consistency1:0, consistency2:0, consistency3:0, consistency5:0 };
        updateProgress(0);
      }

      renderInit();
    })();
  </script>
</body>
</html>
