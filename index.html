<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional-grade, comprehensive cognitive assessment battery. Measures Gf, Gq, Gwm, and Gs.">
    <title>Comprehensive Clinical Cognitive Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; }
        .wm-tile { transition: all 0.2s ease; }
        .wm-tile.active { background-color: #3b82f6; transform: scale(0.95); }
        .wm-tile:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .gs-symbol { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4 md:p-8">

    <div id="app" class="w-full max-w-5xl bg-white rounded-2xl shadow-2xl overflow-hidden min-h-[700px] flex flex-col relative fade-in border border-slate-100">
        <!-- Dynamic Content -->
    </div>

<script>
/**
 * COMPREHENSIVE CLINICAL COGNITIVE ASSESSMENT ENGINE
 * Phase 1: Gq (Quantitative)
 * Phase 2: Gf (Spatial/Fluid)
 * Phase 3: Gwm-F (Forward Memory)
 * Phase 4: Gwm-B (Backward Memory)
 * Phase 5: Gs (Processing Speed)
 */

// --- STATE MANAGEMENT ---
const state = {
    phase: 'setup', 
    ageMonths: 120,
    globalProgress: 0, // 0 to 100 across the whole battery

    gq: { level: 1, consecPass: 0, consecFail: 0, count: 0, max: 20, history: [], currentStart: 0, currentQ: null },
    gf: { level: 1, consecPass: 0, consecFail: 0, count: 0, max: 25, history: [], currentStart: 0, currentQ: null },
    wm_f: { sequence: [], userIndex: 0, currentLength: 3, failsAtCurrent: 0, maxScore: 0, isFlashing: false },
    wm_b: { sequence: [], userIndex: 0, currentLength: 2, failsAtCurrent: 0, maxScore: 0, isFlashing: false },
    gs: { timeRemaining: 60, score: 0, active: false, currentTarget: '', options: [], timerId: null }
};

const appDiv = document.getElementById('app');

// --- GENERATORS ---
const gen = {
    math: (level) => {
        let seq = [], ans, dist = [], rule = "?";
        if (level === 1) {
            let start = Math.floor(Math.random()*10)+2;
            let step = Math.floor(Math.random()*5)+2;
            seq = [start, start+step, start+step*2, start+step*3];
            ans = start+step*4;
            dist = [ans-1, ans+1, ans-step, ans+step+1];
        } else if (level === 2) {
            let start = Math.floor(Math.random()*5)+2;
            let mult = Math.floor(Math.random()*3)+2;
            seq = [start, start*mult, start*mult*mult, start*mult*mult*mult];
            ans = start*Math.pow(mult, 4);
            dist = [ans-mult, ans+start, ans/2, ans+1];
        } else if (level === 3) {
            let start = Math.floor(Math.random()*20)+10;
            let step = Math.floor(Math.random()*4)+2;
            seq = [start, start-step, (start-step)*2, ((start-step)*2)-step];
            ans = (((start-step)*2)-step)*2;
            dist = [ans-step, ans+step, ans/2, ans-10];
        } else {
            let a = Math.floor(Math.random()*3)+1;
            let b = Math.floor(Math.random()*4)+2;
            seq = [a, b, a+b, b+(a+b), (a+b)+(b+(a+b))];
            ans = (b+(a+b)) + ((a+b)+(b+(a+b)));
            dist = [ans-1, ans+2, ans-b, ans+10];
        }
        dist = [...new Set(dist)].filter(d => d !== ans).slice(0, 4);
        while(dist.length < 4) dist.push(ans + Math.floor(Math.random()*10)+1);
        let opts = [...dist, ans].sort(() => Math.random() - 0.5).slice(0,4);
        if(!opts.includes(ans)) opts[Math.floor(Math.random()*4)] = ans;

        return {
            html: `<div class="text-3xl md:text-5xl font-mono tracking-widest text-center text-slate-700">${seq.join(', ')}, <span class="text-blue-600 font-bold">${rule}</span></div>`,
            opts: opts, ans: ans, isHtml: false
        };
    },

    spatial: (level) => {
        const shapes = ['rect', 'circle', 'polygon'];
        const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316'];
        
        let s = shapes[Math.floor(Math.random() * shapes.length)];
        let c1 = colors[Math.floor(Math.random() * colors.length)];
        let c2 = colors[Math.floor(Math.random() * colors.length)];
        while(c1 === c2) c2 = colors[Math.floor(Math.random() * colors.length)];
        
        const d = (rot, sc, fill, dashed=false) => {
            let str = `<g transform="rotate(${rot} 25 25)">`;
            if(s === 'rect') str += `<rect x="${25 - (20*sc)}" y="${25 - (20*sc)}" width="${40*sc}" height="${40*sc}" fill="${fill}" ${dashed?'stroke="#000" stroke-width="2" stroke-dasharray="4,2"':''}/>`;
            if(s === 'circle') str += `<circle cx="25" cy="25" r="${20*sc}" fill="${fill}" ${dashed?'stroke="#000" stroke-width="2" stroke-dasharray="4,2"':''}/>`;
            if(s === 'polygon') str += `<polygon points="25,${25 - 20*sc} ${25 + 20*sc},${25 + 20*sc} ${25 - 20*sc},${25 + 20*sc}" fill="${fill}" ${dashed?'stroke="#000" stroke-width="2" stroke-dasharray="4,2"':''}/>`;
            return str + `</g>`;
        };

        let sB = `<svg viewBox="0 0 50 50" class="w-16 h-16 md:w-20 md:h-20 inline-block shadow-sm rounded bg-white">`;
        let m = `<div class="grid grid-cols-3 gap-2 md:gap-4 mx-auto bg-slate-100 p-4 md:p-6 rounded-2xl border-2 border-slate-200">`;
        let ans, dist = [];

        if (level === 1) { // Simple Rotation
            for(let i=0;i<8;i++) m += `${sB}${d(i*45, 1, c1)}</svg>`;
            m += `<div class="w-16 h-16 md:w-20 md:h-20 inline-flex items-center justify-center border-4 border-dashed border-blue-400 rounded bg-blue-50 text-blue-500 text-3xl font-black">?</div>`;
            ans = `${sB}${d(360, 1, c1)}</svg>`;
            dist = [`${sB}${d(45, 1, c1)}</svg>`,`${sB}${d(90, 1, c2)}</svg>`,`${sB}${d(0, 0.5, c1)}</svg>`];
        } else if (level === 2) { // Logic (A + B = C)
            for(let r=0; r<2; r++) m += `${sB}${d(0, 0.6, c1)}</svg>${sB}${d(45, 0.6, c2)}</svg>${sB}${d(0, 0.6, c1)}${d(45, 0.6, c2, true)}</svg>`;
            m += `${sB}${d(90, 0.6, c1)}</svg>${sB}${d(135, 0.6, c2)}</svg><div class="w-16 h-16 md:w-20 md:h-20 inline-flex items-center justify-center border-4 border-dashed border-blue-400 rounded bg-blue-50 text-blue-500 text-3xl font-black">?</div>`;
            ans = `${sB}${d(90, 0.6, c1)}${d(135, 0.6, c2, true)}</svg>`;
            dist = [`${sB}${d(0, 0.6, c1)}${d(45, 0.6, c2, true)}</svg>`,`${sB}${d(135, 0.6, c1)}${d(90, 0.6, c2, true)}</svg>`,`${sB}${d(90, 1, c1)}</svg>`];
        } else { // Complex Multi-variable
             for(let r=0; r<2; r++) m += `${sB}${d(0, 0.4, c1)}</svg>${sB}${d(45, 0.7, c2)}</svg>${sB}${d(90, 1.0, colors[3])}</svg>`;
             m += `${sB}${d(0, 0.4, c1)}</svg>${sB}${d(45, 0.7, c2)}</svg><div class="w-16 h-16 md:w-20 md:h-20 inline-flex items-center justify-center border-4 border-dashed border-blue-400 rounded bg-blue-50 text-blue-500 text-3xl font-black">?</div>`;
             ans = `${sB}${d(90, 1.0, colors[3])}</svg>`;
             dist = [`${sB}${d(90, 0.7, colors[3])}</svg>`,`${sB}${d(45, 1.0, c1)}</svg>`,`${sB}${d(90, 1.0, c2)}</svg>`];
        }
        m += `</div>`;
        let opts = [...dist, ans].sort(() => Math.random() - 0.5);

        return { html: m, opts: opts, ans: ans, isHtml: true };
    },
    
    symbols: () => {
        const syms = ['Ω','Σ','Δ','Ψ','Φ','Γ','Λ','Θ','Ξ','Π'];
        let target = syms[Math.floor(Math.random() * syms.length)];
        let isPresent = Math.random() > 0.4; // 60% chance present
        let opts = [];
        for(let i=0; i<4; i++) opts.push(syms[Math.floor(Math.random() * syms.length)]);
        if (isPresent && !opts.includes(target)) opts[Math.floor(Math.random() * 4)] = target;
        if (!isPresent && opts.includes(target)) opts[opts.indexOf(target)] = syms.find(s => s !== target);
        return { target, opts, isPresent };
    }
};

// --- CORE LOGIC ---

function updateGlobalProgress() {
    // Math 20%, Spatial 25%, WMF 20%, WMB 20%, Speed 15%
    let p = 0;
    if(state.phase.includes('gq')) p = (state.gq.count / state.gq.max) * 20;
    else if(state.phase.includes('gf')) p = 20 + ((state.gf.count / state.gf.max) * 25);
    else if(state.phase.includes('wm_f')) p = 45 + ((state.wm_f.currentLength-3)/5 * 20);
    else if(state.phase.includes('wm_b')) p = 65 + ((state.wm_b.currentLength-2)/5 * 20);
    else if(state.phase.includes('gs')) p = 85 + ((60-state.gs.timeRemaining)/60 * 15);
    else if(state.phase === 'results') p = 100;
    state.globalProgress = Math.min(100, Math.max(0, p));
}

function handleAdaptiveAnswer(domain, selectedIndex) {
    const d = state[domain];
    const q = d.currentQ;
    const isCorrect = q.opts[selectedIndex] === q.ans;
    const timeTaken = Date.now() - d.currentStart;

    d.history.push({ level: d.level, correct: isCorrect, timeMs: timeTaken });

    if (isCorrect) { d.consecPass++; d.consecFail = 0; } 
    else { d.consecFail++; d.consecPass = 0; }

    if (d.consecPass >= 2 && d.level < 4) { d.level++; d.consecPass = 0; }
    else if (d.consecFail >= 2 && d.level > 1) { d.level--; d.consecFail = 0; }

    d.count++;
    updateGlobalProgress();

    if (d.count >= d.max) {
        if(domain === 'gq') { state.phase = 'intro_gf'; }
        if(domain === 'gf') { state.phase = 'intro_wm_f'; }
    } else {
        d.currentQ = domain === 'gq' ? gen.math(d.level) : gen.spatial(d.level);
        d.currentStart = Date.now();
    }
    render();
}

function handleWmClick(idx, isBackward = false) {
    const d = isBackward ? state.wm_b : state.wm_f;
    if (d.isFlashing) return;

    const t = document.getElementById(`wm-tile-${idx}`);
    t.classList.add('bg-blue-300', 'scale-90');
    setTimeout(() => t.classList.remove('bg-blue-300', 'scale-90'), 200);

    // Backward logic checks against reverse sequence
    const checkArray = isBackward ? [...d.sequence].reverse() : d.sequence;

    if (idx === checkArray[d.userIndex]) {
        d.userIndex++;
        if (d.userIndex === d.sequence.length) {
            d.maxScore = d.currentLength;
            d.currentLength++;
            d.failsAtCurrent = 0;
            document.getElementById('wm-status').innerHTML = '<i class="fa-solid fa-check-circle text-green-500 text-7xl bg-white rounded-full"></i>';
            setTimeout(() => { generateWmSequence(isBackward); updateGlobalProgress(); }, 1200);
        }
    } else {
        d.failsAtCurrent++;
        document.getElementById('wm-status').innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-7xl bg-white rounded-full"></i>';
        if (d.failsAtCurrent >= 2) {
            setTimeout(() => {
                state.phase = isBackward ? 'intro_gs' : 'intro_wm_b';
                updateGlobalProgress();
                render();
            }, 1500);
        } else {
            setTimeout(() => generateWmSequence(isBackward), 1500);
        }
    }
}

function generateWmSequence(isBackward = false) {
    const d = isBackward ? state.wm_b : state.wm_f;
    d.sequence = [];
    d.userIndex = 0;
    for(let i=0; i<d.currentLength; i++) d.sequence.push(Math.floor(Math.random() * 9));
    render();
    setTimeout(() => playWmSequence(isBackward), 800);
}

async function playWmSequence(isBackward = false) {
    const d = isBackward ? state.wm_b : state.wm_f;
    d.isFlashing = true;
    render();
    
    for(let i=0; i<d.sequence.length; i++) {
        const t = document.getElementById(`wm-tile-${d.sequence[i]}`);
        await new Promise(r => setTimeout(r, 400));
        t.classList.add('bg-blue-600', 'scale-95', 'shadow-inner');
        t.classList.remove('bg-slate-100');
        await new Promise(r => setTimeout(r, 600));
        t.classList.remove('bg-blue-600', 'scale-95', 'shadow-inner');
        t.classList.add('bg-slate-100');
    }
    d.isFlashing = false;
    render();
}

function runGsTick() {
    if(!state.gs.active) return;
    state.gs.timeRemaining--;
    updateGlobalProgress();
    if(state.gs.timeRemaining <= 0) {
        state.gs.active = false;
        clearInterval(state.gs.timerId);
        state.phase = 'results';
        updateGlobalProgress();
        render();
    } else {
        document.getElementById('gs-timer').innerText = state.gs.timeRemaining;
    }
}

function handleGsAnswer(selectedPresent) {
    if(!state.gs.active) return;
    const isCorrect = selectedPresent === state.gs.current.isPresent;
    if(isCorrect) state.gs.score++;
    else state.gs.score = Math.max(0, state.gs.score - 1); // Penalty for guessing
    
    state.gs.current = gen.symbols();
    renderGsTest(true); // partial render
}

// --- RENDERERS ---

function TopBar(title) {
    return `
        <div class="h-2 w-full bg-slate-100 absolute top-0 left-0">
            <div class="h-full bg-blue-600 transition-all duration-500 ease-out" style="width: ${state.globalProgress}%"></div>
        </div>
        <div class="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center bg-white/50 backdrop-blur-sm pt-6 md:pt-8">
            <span class="font-bold text-slate-800 tracking-tight text-lg">${title}</span>
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider hidden md:block">Clinical Battery</span>
        </div>
    `;
}

function render() {
    switch(state.phase) {
        case 'setup':
            appDiv.innerHTML = `
                <div class="p-6 md:p-16 flex-1 flex flex-col justify-center items-center text-center bg-white">
                    <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-blue-500/30 transform -rotate-3">
                        <i class="fa-solid fa-brain text-5xl"></i>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-6 tracking-tight">Comprehensive Cognitive Battery</h1>
                    <p class="text-lg text-slate-500 mb-10 max-w-2xl leading-relaxed">A professional-grade 5-phase psychometric assessment measuring Quantitative Reasoning, Spatial Logic, Working Memory, and Processing Speed.</p>
                    
                    <div class="bg-slate-50 p-8 rounded-2xl border border-slate-200 w-full max-w-md shadow-sm">
                        <label class="block text-sm font-bold text-slate-700 mb-3 text-left">Subject's Chronological Age (Years)</label>
                        <input type="number" id="ageInput" min="6" max="99" value="16" class="w-full p-4 border border-slate-300 rounded-xl mb-6 text-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all font-mono font-bold text-slate-700">
                        <button onclick="(function(){
                            let a = parseInt(document.getElementById('ageInput').value);
                            if(a >= 6 && a <= 99) { state.ageMonths = a*12; state.phase = 'intro_gq'; render(); }
                            else alert('Age must be 6-99');
                        })()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition-colors shadow-lg shadow-slate-800/20 text-lg flex justify-center items-center group">
                            Initialize Assessment <i class="fa-solid fa-arrow-right ml-3 group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </div>`;
            break;

        case 'intro_gq':
        case 'intro_gf':
        case 'intro_wm_f':
        case 'intro_wm_b':
        case 'intro_gs':
            const config = {
                'intro_gq': { t: 'Phase 1: Quantitative Reasoning', icon: 'fa-hashtag', color: 'blue', desc: 'Identify the underlying mathematical rule to complete the numerical sequence.', btn: 'Start Phase 1', next: () => { state.phase = 'gq_test'; state.gq.currentQ = gen.math(1); state.gq.currentStart = Date.now(); render(); } },
                'intro_gf': { t: 'Phase 2: Fluid Spatial Logic', icon: 'fa-shapes', color: 'indigo', desc: 'Analyze the grid of shapes and select the missing piece that completes the logical pattern.', btn: 'Start Phase 2', next: () => { state.phase = 'gf_test'; state.gf.currentQ = gen.spatial(1); state.gf.currentStart = Date.now(); render(); } },
                'intro_wm_f': { t: 'Phase 3: Forward Working Memory', icon: 'fa-arrow-right-long', color: 'emerald', desc: 'Observe the sequence of flashing blocks. Tap them in the EXACT SAME order.', btn: 'Start Phase 3', next: () => { state.phase = 'wm_f_test'; generateWmSequence(false); } },
                'intro_wm_b': { t: 'Phase 4: Backward Working Memory', icon: 'fa-arrow-left-long', color: 'amber', desc: 'Observe the sequence. You must tap them in the REVERSE order (backwards).', btn: 'Start Phase 4', next: () => { state.phase = 'wm_b_test'; generateWmSequence(true); } },
                'intro_gs': { t: 'Phase 5: Processing Speed', icon: 'fa-bolt', color: 'rose', desc: 'You have 60 seconds. Does the target symbol appear in the group? Work as fast as possible.', btn: 'Start Final Phase', next: () => { state.phase = 'gs_test'; state.gs.active = true; state.gs.current = gen.symbols(); state.gs.timerId = setInterval(runGsTick, 1000); render(); } }
            }[state.phase];

            appDiv.innerHTML = `
                ${TopBar('Instruction Set')}
                <div class="p-10 flex-1 flex flex-col justify-center items-center text-center bg-white">
                    <div class="w-20 h-20 bg-${config.color}-100 text-${config.color}-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm border border-${config.color}-200">
                        <i class="fa-solid ${config.icon} text-4xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-4">${config.t}</h2>
                    <p class="text-lg text-slate-600 mb-10 max-w-lg leading-relaxed">${config.desc}</p>
                    <button id="startBtn" class="bg-${config.color}-600 text-white font-bold py-4 px-12 rounded-xl hover:bg-${config.color}-700 transition shadow-lg shadow-${config.color}-500/30 text-lg">
                        ${config.btn}
                    </button>
                </div>`;
            document.getElementById('startBtn').onclick = config.next;
            break;

        case 'gq_test':
        case 'gf_test':
            const isGq = state.phase === 'gq_test';
            const d = isGq ? state.gq : state.gf;
            const q = d.currentQ;
            appDiv.innerHTML = `
                ${TopBar(isGq ? 'Phase 1: Quantitative (Gq)' : 'Phase 2: Spatial (Gf)')}
                <div class="w-full flex justify-between px-6 py-2 bg-slate-50 border-b text-xs font-bold text-slate-400 uppercase tracking-wider">
                    <span>Item ${d.count + 1} / ${d.max}</span>
                    <span class="flex gap-1 items-center">Level ${'<div class="w-1.5 h-1.5 rounded-full bg-slate-800"></div>'.repeat(d.level)}${'<div class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>'.repeat(4 - d.level)}</span>
                </div>
                <div class="flex-1 p-6 md:p-12 flex flex-col items-center justify-center bg-white">
                    <div class="mb-12 w-full flex justify-center transform scale-110">
                        ${q.html}
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
                        ${q.opts.map((opt, i) => `
                            <button onclick="handleAdaptiveAnswer('${isGq?'gq':'gf'}', ${i})" class="p-6 md:p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition flex items-center justify-center text-3xl font-black text-slate-700 shadow-sm hover:shadow-md h-32">
                                ${q.isHtml ? opt : opt}
                            </button>
                        `).join('')}
                    </div>
                </div>`;
            break;

        case 'wm_f_test':
        case 'wm_b_test':
            const isBack = state.phase === 'wm_b_test';
            const wd = isBack ? state.wm_b : state.wm_f;
            appDiv.innerHTML = `
                ${TopBar(isBack ? 'Phase 4: Backward Memory (Gwm-B)' : 'Phase 3: Forward Memory (Gwm-F)')}
                <div class="flex-1 p-10 flex flex-col items-center justify-center relative bg-slate-50">
                    <div id="wm-status" class="absolute inset-0 pointer-events-none flex items-center justify-center z-10"></div>
                    <div class="mb-8 text-center h-8 text-slate-700 font-bold text-xl uppercase tracking-widest ${wd.isFlashing ? 'animate-pulse text-blue-600' : ''}">
                        ${wd.isFlashing ? 'Memorize...' : (isBack ? 'Recall Backwards!' : 'Recall Sequence!')}
                    </div>
                    <div class="grid grid-cols-3 gap-3 md:gap-5 w-full max-w-md mx-auto p-6 bg-white rounded-3xl shadow-sm border border-slate-200">
                        ${[0,1,2,3,4,5,6,7,8].map(i => `
                            <div id="wm-tile-${i}" onclick="handleWmClick(${i}, ${isBack})" class="wm-tile aspect-square bg-slate-100 rounded-2xl shadow-sm cursor-pointer ${wd.isFlashing ? 'pointer-events-none' : 'hover:bg-blue-50 border-2 border-transparent hover:border-blue-200'}"></div>
                        `).join('')}
                    </div>
                </div>`;
            break;

        case 'gs_test':
            renderGsTest();
            break;

        case 'results':
            renderResults();
            break;
    }
}

function renderGsTest(partial = false) {
    const html = `
        ${!partial ? TopBar('Phase 5: Processing Speed (Gs)') : ''}
        ${!partial ? `<div class="w-full flex justify-between px-6 py-3 bg-slate-800 text-white font-bold text-lg">
            <span>Score: <span id="gs-score" class="text-rose-400">0</span></span>
            <span><i class="fa-regular fa-clock mr-2"></i><span id="gs-timer">60</span>s</span>
        </div>` : ''}
        <div class="flex-1 p-8 flex flex-col items-center justify-center bg-white" id="gs-play-area">
            <div class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Target Symbol</div>
            <div class="text-7xl font-bold gs-symbol mb-12 text-slate-800 bg-slate-100 w-32 h-32 flex items-center justify-center rounded-2xl border-2 border-slate-200 shadow-inner">
                ${state.gs.current?.target || ''}
            </div>
            <div class="flex gap-4 md:gap-8 mb-12">
                ${(state.gs.current?.opts || []).map(s => `<div class="text-5xl gs-symbol text-slate-600">${s}</div>`).join('')}
            </div>
            <div class="flex gap-6 w-full max-w-md">
                <button onclick="handleGsAnswer(false)" class="flex-1 py-6 bg-white border-2 border-slate-200 rounded-xl text-xl font-bold text-slate-600 hover:bg-slate-50 shadow-sm hover:border-slate-400 transition">ABSENT</button>

    if(!partial) appDiv.innerHTML = html;
    else {
        document.getElementById('gs-play-area').innerHTML = new DOMParser().parseFromString(html, 'text/html').getElementById('gs-play-area').innerHTML;
        document.getElementById('gs-score').innerText = state.gs.score;
    }
}

    const a = state.ageMonths/12;
    // Expected baselines map to a curve peaking at age 22-25
    const exp = (base) => a < 16 ? base * (a/16) : (a > 45 ? base - ((a-45)*0.1) : base);
    
    const calcIndex = (raw, max, expectedBase) => {
        const expected = exp(expectedBase);
        const z = (raw - expected) / (expected * 0.3); // SD roughly 30% of expected
        return Math.min(150, Math.max(50, Math.round(100 + (z * 15))));
    };

    const iqGf = calcIndex(rawGf, state.gf.max * 6, 30);
