<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cognitive Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .shadow-xl, .shadow-md { box-shadow: none !important; }
            .border-b { border-color: #000 !important; }
            .print-break { page-break-before: always; }
        }
        
        /* Grid helpers for visual matrices */
        .matrix-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; background: #e2e8f0; border-radius: 8px; width: fit-content; margin: 0 auto; }
        .matrix-cell { width: 64px; height: 64px; background: white; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
        .matrix-cell.missing { background: #f1f5f9; border: 2px dashed #94a3b8; font-size: 24px; font-weight: bold; color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div id="app" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[600px] flex flex-col relative fade-in border border-slate-200">
        <!-- Dynamic content injected here -->
    </div>

    <script>
        const state = {
            currentQuestion: 0,
            startTime: null,
            questionStartTime: null,
            timeLimit: 2400, // 40 minutes for 40 professional questions
            timerInterval: null,
            responses: [], // Stores {qIdx, correct, timeTaken}
            categories: {
                quantitative: { score: 0, total: 0, time: 0 },
                spatial: { score: 0, total: 0, time: 0 },
                logic: { score: 0, total: 0, time: 0 }
            }
        };

        const questions = [];

        function addMathQ(seq, missing, options, rule) {
            questions.push({
                category: 'quantitative',
                prompt: `<div class="mb-4 text-sm text-slate-500 font-semibold tracking-wider uppercase">Quantitative Reasoning</div>
                         <div class="flex justify-center items-center flex-wrap gap-3 mb-8">
                            ${seq.map(n => `<div class="text-3xl sm:text-4xl font-mono text-slate-800">${n}</div><div class="text-xl text-slate-300">,</div>`).join('')}
                            <div class="text-3xl sm:text-4xl font-mono border-b-4 border-blue-500 w-16 text-center pb-1 text-blue-600">?</div>
                         </div>
                         <p class="text-center text-slate-600 mb-2 font-medium">Select the missing value.</p>`,
                options: options.map(String),
                correct: options.indexOf(missing)
            });
            state.categories.quantitative.total++;
        }

        // Tier 1: Interleaved Sequences & Primes
        addMathQ([2, 3, 5, 7, 11, 13], 17, [15, 16, 17, 19], "Primes");
        addMathQ([1, 4, 2, 8, 4, 16, 8], 32, [16, 24, 32, 64], "Interleaved *2");
        addMathQ([10, 9, 11, 8, 12, 7], 13, [6, 12, 13, 14], "Interleaved +/-");
        addMathQ([1, 8, 27, 64, 125], 216, [144, 216, 256, 512], "Cubes");
        
        // Tier 2: Complex numerical relationships
        for(let i=1; i<=5; i++) {
            let start = i*3;
            addMathQ([start, start*2+1, (start*2+1)*2+1, ((start*2+1)*2+1)*2+1], (((start*2+1)*2+1)*2+1)*2+1, 
            [(((start*2+1)*2+1)*2+1)*2+1, (((start*2+1)*2+1)*2+1)*2-1, (((start*2+1)*2+1)*2+1)*2+3, (((start*2+1)*2+1)*2+1)*2+5], "(n*2)+1");
        }
        
        // Tier 3: Fractions / Decimals
        addMathQ(["1/2", "3/4", "5/8", "7/16"], "9/32", ["9/24", "9/32", "11/32", "11/64"], "Fractions");
        addMathQ(["0.5", "1.5", "4.5", "13.5"], "40.5", ["27.5", "30.5", "40.5", "42.5"], "Decimals *3");
        addMathQ([1, 2, 6, 24, 120], 720, [240, 480, 600, 720], "Factorials");
        addMathQ([2, 5, 14, 41, 122], 365, [244, 365, 488, 729], "n*3 - 1");

        function addLogicQ(seq, missing, options) {
            questions.push({
                category: 'logic',
                prompt: `<div class="mb-4 text-sm text-slate-500 font-semibold tracking-wider uppercase">Abstract Logic</div>
                         <div class="flex justify-center items-center flex-wrap gap-4 mb-8">
                            ${seq.map(n => `<div class="text-2xl sm:text-3xl font-bold text-slate-700 bg-slate-100 p-4 rounded-lg">${n}</div><div class="text-slate-300">→</div>`).join('')}
                            <div class="text-2xl sm:text-3xl font-bold border-2 border-dashed border-blue-500 bg-blue-50 p-4 rounded-lg w-16 text-center text-blue-600">?</div>
                         </div>
                         <p class="text-center text-slate-600 mb-2 font-medium">Identify the logical progression.</p>`,
                options: options,
                correct: options.indexOf(missing)
            });
            state.categories.logic.total++;
        }

        addLogicQ(['A', 'C', 'F', 'J', 'O'], 'U', ['S', 'T', 'U', 'V']);
        addLogicQ(['Z', 'X', 'U', 'Q', 'L'], 'F', ['E', 'F', 'G', 'H']);
        addLogicQ(['A1', 'C4', 'E9', 'G16'], 'I25', ['H20', 'I25', 'J25', 'I36']);
        addLogicQ(['B', 'E', 'I', 'N', 'T'], 'A', ['Z', 'A', 'B', 'C']); // Modulo 26
        
        for(let i=1; i<=9; i++) {
            const shift = i % 3 + 1;
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const start = i;
            addLogicQ(
                [letters[start], letters[start+shift], letters[start+shift*2], letters[start+shift*3]], 
                letters[start+shift*4], 
                [letters[start+shift*4-1], letters[start+shift*4], letters[start+shift*4+1], letters[start+shift*4+2]]
            );
        }

        const svgShapes = {
            circle: (c, rot=0) => `<circle cx="32" cy="32" r="20" fill="none" stroke="${c}" stroke-width="4" transform="rotate(${rot} 32 32)"/>`,
            square: (c, rot=0) => `<rect x="16" y="16" width="32" height="32" fill="none" stroke="${c}" stroke-width="4" transform="rotate(${rot} 32 32)"/>`,
            triangle: (c, rot=0) => `<polygon points="32,12 52,48 12,48" fill="none" stroke="${c}" stroke-width="4" transform="rotate(${rot} 32 32)"/>`,
            cross: (c, rot=0) => `<path d="M32 12 V52 M12 32 H52" stroke="${c}" stroke-width="4" transform="rotate(${rot} 32 32)"/>`
        };

        function addSpatial3x3(matrixData, missing, options) {
            let gridHtml = `<div class="matrix-3x3 mb-8">`;
            for(let i=0; i<8; i++) {
                gridHtml += `<div class="matrix-cell"><svg width="64" height="64">${matrixData[i]}</svg></div>`;
            }
            gridHtml += `<div class="matrix-cell missing">?</div></div>`;

            questions.push({
                category: 'spatial',
                prompt: `<div class="mb-4 text-sm text-slate-500 font-semibold tracking-wider uppercase">Spatial Processing</div>
                         ${gridHtml}
                         <p class="text-center text-slate-600 mb-2 font-medium">Select the image that logically completes the 3x3 matrix.</p>`,
                options: options.map(opt => `<svg width="48" height="48" viewBox="0 0 64 64">${opt}</svg>`),
                correct: options.indexOf(missing)
            });
            state.categories.spatial.total++;
        }

        // Generate 14 Professional 3x3 Matrices
        const sKeys = Object.keys(svgShapes);
        const colors = ['#334155', '#3b82f6', '#ef4444'];
        
        for(let i=0; i<14; i++) {
            let cells = [];
            let optCells = [];
            
            // Logic: Row 1 and 2 define a pattern (e.g. rotation or shape change), Row 3 applies it.
            let shapeBase = sKeys[i % sKeys.length];
            let colorBase = colors[i % colors.length];
            let type = i % 3; // 0: Rotate, 1: Add shape, 2: Color shift

            if (type === 0) {
                // Rotation logic (adds 45 degrees per cell)
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let rot = (r*90 + c*45);
                        if (r!==2 || c!==2) cells.push(svgShapes[shapeBase](colorBase, rot));
                        else {
                            let correct = svgShapes[shapeBase](colorBase, rot);
                            optCells = [correct, svgShapes[shapeBase](colorBase, rot-45), svgShapes[shapeBase](colorBase, rot+90), svgShapes[shapeBase](colorBase, rot+45)];
                        }
                    }
                }
            } else if (type === 1) {
                // Shape sequence logic
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let s = sKeys[(r + c) % sKeys.length];
                        if (r!==2 || c!==2) cells.push(svgShapes[s](colorBase));
                        else {
                            let correct = svgShapes[s](colorBase);
                            optCells = [svgShapes[sKeys[(r+c+1)%sKeys.length]](colorBase), correct, svgShapes[sKeys[(r+c+2)%sKeys.length]](colorBase), svgShapes[shapeBase]('#10b981')];
                        }
                    }
                }
            } else {
                // Compound logic (Shape + inner shape)
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let outer = svgShapes[sKeys[r]](colors[0]);
                        let inner = svgShapes[sKeys[c]](colors[1], 0).replace('stroke-width="4"', 'stroke-width="2" transform="scale(0.5) translate(32 32)"');
                        let combined = outer + inner;
                        if (r!==2 || c!==2) cells.push(combined);
                        else {
                            let correct = combined;
                            let wrong1 = svgShapes[sKeys[r]](colors[0]) + svgShapes[sKeys[(c+1)%3]](colors[1], 0).replace('stroke-width="4"', 'stroke-width="2" transform="scale(0.5) translate(32 32)"');
                            let wrong2 = svgShapes[sKeys[(r+1)%3]](colors[0]) + inner;
                            let wrong3 = svgShapes[sKeys[r]](colors[2]) + inner;
                            optCells = [wrong1, wrong2, correct, wrong3];
                        }
                    }
                }
            }
            
            // Randomize options
            let correctStr = optCells.find(x => x);
            optCells.sort(() => Math.random() - 0.5);
            addSpatial3x3(cells, correctStr, optCells);
        }


        const appDiv = document.getElementById('app');

        function initApp() {
            appDiv.innerHTML = `
                <div class="p-8 sm:p-12 flex flex-col h-full justify-center">
                    <div class="mb-8 text-center">
                        <div class="inline-block bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase mb-4">Professional Grade</div>
                        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Cognitive Assessment Battery</h1>
                        <p class="text-lg text-slate-500 max-w-2xl mx-auto">A comprehensive, 40-question psychometric evaluation measuring quantitative reasoning, fluid intelligence, and spatial processing.</p>
                    </div>
                    
                    <div class="bg-slate-50 border border-slate-200 p-6 rounded-2xl mb-8 text-sm text-slate-600 shadow-inner">
                        <h3 class="font-bold text-slate-800 mb-2 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            Strict Privacy & Clinical Disclaimer
                        </h3>
                        <p class="mb-2"><strong>Zero Data Collection:</strong> This assessment operates 100% locally on your device. No data, scores, or personal identifiers are transmitted to any server. It is fully COPPA and GDPR-K compliant by design.</p>
                        <p><strong>Clinical Limitation:</strong> Results provide an <em>informational estimate</em> of fluid reasoning domains. It is not a clinical diagnostic tool (such as the WAIS-IV or WISC-V) and should not be used for medical or educational placement.</p>
                    </div>

                    <button onclick="startAssessment()" class="w-full sm:w-auto mx-auto bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 px-12 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg hover:shadow-blue-500/30 text-lg">
                        Begin Assessment (40 Min)
                    </button>
                </div>
            `;
        }

        function startAssessment() {
            state.currentQuestion = 0;
            state.startTime = Date.now();
            state.questionStartTime = Date.now();
            state.responses = [];
            
            // Reset categories
            Object.keys(state.categories).forEach(k => {
                state.categories[k].score = 0;
                state.categories[k].time = 0;
            });
            
            state.timerInterval = setInterval(updateTimer, 1000);
            renderQuestion();
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
            const remaining = state.timeLimit - elapsed;
            
            const timerEl = document.getElementById('timer-text');
            const progressEl = document.getElementById('timer-bar');
            
            if (timerEl && progressEl) {
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                timerEl.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                progressEl.style.width = `${(remaining / state.timeLimit) * 100}%`;
                
                if (remaining <= 300) progressEl.classList.replace('bg-slate-800', 'bg-red-500'); // 5 min warning
            }

            if (remaining <= 0) {
                clearInterval(state.timerInterval);
                processResults();
            }
        }

        function renderQuestion() {
            const q = questions[state.currentQuestion];
            const progressPct = ((state.currentQuestion) / questions.length) * 100;
            state.questionStartTime = Date.now();

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="bg-white p-5 flex justify-between items-center border-b border-slate-100 z-10 relative">
                    <div class="flex items-center space-x-4">
                        <div class="text-sm font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-md">Q ${state.currentQuestion + 1} / ${questions.length}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <div class="text-sm font-bold text-slate-700 w-12" id="timer-text">--:--</div>
                    </div>
                </div>

                <!-- Progress Bars -->
                <div class="h-1 w-full bg-slate-100 flex flex-col">
                    <div id="timer-bar" class="h-0.5 bg-slate-800 transition-all duration-1000" style="width: 100%"></div>
                    <div class="h-0.5 bg-blue-500 transition-all duration-500" style="width: ${progressPct}%"></div>
                </div>

                <!-- Question Body -->
                <div class="p-8 sm:p-12 flex-grow flex flex-col items-center justify-center fade-in no-select bg-slate-50/50">
                    <div class="w-full max-w-2xl text-center">
                        ${q.prompt}
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 w-full max-w-2xl mt-12">
                        ${q.options.map((opt, idx) => `
                            <button onclick="handleAnswer(${idx})" class="p-6 sm:p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-blue-500 hover:shadow-lg hover:shadow-blue-500/10 flex justify-center items-center transition-all duration-200 group transform hover:-translate-y-1">
                                <div class="group-hover:scale-105 transition-transform duration-200 font-bold text-xl sm:text-2xl text-slate-700">${opt}</div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleAnswer(selectedIndex) {
            const q = questions[state.currentQuestion];
            const timeTaken = Math.floor((Date.now() - state.questionStartTime) / 1000);
            const isCorrect = selectedIndex === q.correct;
            
            // Record data
            state.responses.push({ isCorrect, timeTaken, category: q.category });
            state.categories[q.category].time += timeTaken;
            if (isCorrect) state.categories[q.category].score++;

            if (state.currentQuestion < questions.length - 1) {
                state.currentQuestion++;
                renderQuestion();
            } else {
                clearInterval(state.timerInterval);
                showProcessingScreen();
            }
        }

        function showProcessingScreen() {
            appDiv.innerHTML = `
                <div class="p-12 flex-grow flex flex-col items-center justify-center fade-in text-center bg-slate-900 text-white">
                    <svg class="animate-spin h-12 w-12 text-blue-500 mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <h2 class="text-2xl font-bold mb-2">Analyzing Responses</h2>
                    <p class="text-slate-400">Computing multidimensional cognitive profile...</p>
                </div>
            `;
            setTimeout(renderDashboard, 2000); // Simulate heavy processing for UX
        }

        function renderDashboard() {
            // Calculate overall
            const totalScore = state.categories.quantitative.score + state.categories.spatial.score + state.categories.logic.score;
            const percentage = totalScore / questions.length;
            
            // Sophisticated IQ approximation (Standard Deviation 15, Mean 100)
            // Range mapped roughly from 60 to 145 based on percentage.
            let estIQ = Math.round(60 + (percentage * 85));
            if (estIQ > 145) estIQ = ">145";

            // Category Calcs
            const getCatPct = (cat) => Math.round((state.categories[cat].score / state.categories[cat].total) * 100) || 0;
            const totalTimeSecs = Math.floor((Date.now() - state.startTime) / 1000);
            const avgTime = (totalTimeSecs / questions.length).toFixed(1);

            appDiv.innerHTML = `
                <div class="p-8 sm:p-12 flex-grow flex flex-col bg-white overflow-y-auto fade-in">
                    
                    <!-- Report Header -->
                    <div class="flex justify-between items-start mb-10 pb-6 border-b border-slate-200">
                        <div>
                            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Cognitive Profile Report</h2>
                            <p class="text-slate-500 mt-1">Generated locally on ${new Date().toLocaleDateString()} &bull; Private & Confidential</p>
                        </div>
                        <button onclick="window.print()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-700 p-3 rounded-lg transition-colors flex items-center shadow-sm">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            Export PDF
                        </button>
                    </div>

                    <!-- Main Metric -->
                    <div class="flex flex-col md:flex-row items-center justify-between bg-slate-900 rounded-3xl p-8 mb-10 shadow-xl print:bg-white print:border print:border-slate-300 print:text-black print:shadow-none">
                        <div class="text-center md:text-left mb-6 md:mb-0 md:w-1/2">
                            <h3 class="text-slate-400 font-semibold uppercase tracking-wider mb-2 print:text-slate-600">Full Scale Estimate (FSIQ-E)</h3>
                            <div class="text-6xl font-black text-white mb-2 print:text-black">${estIQ}</div>
                            <p class="text-slate-400 text-sm print:text-slate-600">Standard Deviation = 15. Raw Score: ${totalScore}/${questions.length}</p>
                        </div>
                        <div class="md:w-1/2 flex gap-4 text-center">
                            <div class="bg-slate-800 p-4 rounded-2xl flex-1 print:border print:border-slate-200 print:bg-slate-50">
                                <div class="text-slate-400 text-xs uppercase font-bold mb-1 print:text-slate-500">Accuracy</div>
                                <div class="text-2xl font-bold text-blue-400">${Math.round(percentage*100)}%</div>
                            </div>
                            <div class="bg-slate-800 p-4 rounded-2xl flex-1 print:border print:border-slate-200 print:bg-slate-50">
                                <div class="text-slate-400 text-xs uppercase font-bold mb-1 print:text-slate-500">Processing Speed</div>
                                <div class="text-2xl font-bold text-emerald-400">${avgTime}s <span class="text-xs font-normal text-slate-500">/ Q</span></div>
                            </div>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-slate-800 mb-6">Domain Analysis</h3>
                    
                    <!-- Sub-score Breakdown -->
                    <div class="space-y-6 mb-12">
                        <!-- Quantitative -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <div>
                                    <h4 class="font-bold text-slate-700">Quantitative Reasoning</h4>
                                    <p class="text-xs text-slate-500">Numerical sequences, modular arithmetic, fractions.</p>
                                </div>
                                <div class="font-bold text-slate-800">${getCatPct('quantitative')}%</div>
                            </div>
                            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-indigo-500 rounded-full" style="width: ${getCatPct('quantitative')}%"></div>
                            </div>
                        </div>

                        <!-- Spatial -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <div>
                                    <h4 class="font-bold text-slate-700">Spatial / Visual Processing</h4>
                                    <p class="text-xs text-slate-500">2D/3D mental rotation, multi-rule matrix completion.</p>
                                </div>
                                <div class="font-bold text-slate-800">${getCatPct('spatial')}%</div>
                            </div>
                            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-rose-500 rounded-full" style="width: ${getCatPct('spatial')}%"></div>
                            </div>
                        </div>

                        <!-- Logic -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <div>
                                    <h4 class="font-bold text-slate-700">Fluid Abstract Logic</h4>
                                    <p class="text-xs text-slate-500">Pattern recognition, symbolic deduction without prior knowledge.</p>
                                </div>
                                <div class="font-bold text-slate-800">${getCatPct('logic')}%</div>
                            </div>
                            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-amber-500 rounded-full" style="width: ${getCatPct('logic')}%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Clinical Disclaimer Footer -->
                    <div class="mt-auto pt-6 border-t border-slate-200 text-xs text-slate-400 no-print">
                        <strong>Disclaimer:</strong> This application utilizes algorithmic matrix generation inspired by standardized public-domain resources (e.g., ICAR). It is intended for educational and personal insight purposes only. It is not affiliated with the Weschler or Stanford-Binet assessments and holds no clinical validity.
                    </div>
                    
                    <div class="mt-8 flex justify-center no-print">
