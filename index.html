</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px] flex flex-col relative fade-in">
        <!-- Dynamic Content Injected Here -->
    </div>

<script>
/**
 * CLINICAL GRADE COGNITIVE ASSESSMENT ENGINE
 * Zero-backend, Client-Side execution for COPPA/GDPR-K Compliance
 */

// --- STATE MANAGEMENT ---
const state = {
    phase: 'setup', // setup, intro_gf, gf_test, intro_wm, wm_test, results
    ageMonths: 120, // Default 10 years
    
    // Gf (Fluid Intelligence - Adaptive)
    gf: {
        level: 1, // 1 (Easy), 2 (Medium), 3 (Hard)
        consecutivePass: 0,
        consecutiveFail: 0,
        questionCount: 0,
        maxQuestions: 20,
        history: [], // { type, level, correct, timeMs }
        currentQuestionStart: 0,
        currentQuestion: null
    },

    // Gwm (Working Memory - Corsi Blocks)
    wm: {
        sequence: [],
        userIndex: 0,
        currentLength: 3,
        failsAtCurrentLength: 0,
        maxScore: 0,
        isFlashing: false
    }
};

// --- DOM ELEMENTS ---
const appDiv = document.getElementById('app');

// --- PROCEDURAL GENERATORS (Gf) ---
const generators = {
    // Arithmetic & Geometric Progressions with Engineered Distractors
    sequence: (level) => {
        let seq = [];
        let answer;
        let distractors = [];
        let ruleText = "";

        if (level === 1) {
            // Simple addition
            let start = Math.floor(Math.random() * 5) + 2;
            let step = Math.floor(Math.random() * 4) + 2;
            seq = [start, start+step, start+step*2, start+step*3];
            answer = start+step*4;
            distractors = [answer-1, answer+1, answer-step, answer+step+1];
            ruleText = "?";
        } else if (level === 2) {
            // Multiplication / Alternating
            let start = Math.floor(Math.random() * 3) + 2;
            let mult = Math.floor(Math.random() * 2) + 2;
            seq = [start, start*mult, start*mult*mult, start*mult*mult*mult];
            answer = start*mult*mult*mult*mult;
            // Engineered distractors: off by addition, missing multiplier
            distractors = [answer-mult, answer+(start*mult), seq[3]*2, answer+1];
            ruleText = "?";
        } else {
            // Fibonacci variant or compound logic
            let a = Math.floor(Math.random() * 3) + 1;
            let b = Math.floor(Math.random() * 4) + 2;
            seq = [a, b, a+b, b+(a+b), (a+b)+(b+(a+b))];
            answer = (b+(a+b)) + ((a+b)+(b+(a+b)));
            distractors = [answer-10, answer+a, answer-b, answer+10];
            ruleText = "?";
        }

        // Shuffle and insert answer
        distractors = [...new Set(distractors)].filter(d => d !== answer).slice(0, 3);
        let options = [...distractors, answer].sort(() => Math.random() - 0.5);

        return {
            promptHTML: `<div class="text-4xl font-mono tracking-widest text-center">${seq.join(', ')}, <span class="text-blue-600 font-bold">${ruleText}</span></div>`,
            options: options,
            answer: answer
        };
    },

    // Spatial Matrices (SVG Generation)
    matrix: (level) => {
        const shapes = ['rect', 'circle', 'polygon'];
        const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308'];
        
        let s = shapes[Math.floor(Math.random() * shapes.length)];
        let c1 = colors[Math.floor(Math.random() * colors.length)];
        let c2 = colors[Math.floor(Math.random() * colors.length)];
        
        const drawShape = (rot, scale, fill) => {
            if(s === 'rect') return `<rect x="${25 - (25*scale)}" y="${25 - (25*scale)}" width="${50*scale}" height="${50*scale}" fill="${fill}" transform="rotate(${rot} 25 25)"/>`;
            if(s === 'circle') return `<circle cx="25" cy="25" r="${25*scale}" fill="${fill}"/>`;
            if(s === 'polygon') return `<polygon points="25,${25 - 25*scale} ${25 + 25*scale},${25 + 25*scale} ${25 - 25*scale},${25 + 25*scale}" fill="${fill}" transform="rotate(${rot} 25 25)"/>`;
        };

        let svgBase = `<svg viewBox="0 0 50 50" class="w-16 h-16 inline-block mx-2 shadow-sm rounded border">`;
        
        let matrixHTML = `<div class="grid grid-cols-3 gap-4 mx-auto w-64 bg-slate-50 p-4 rounded-xl border">`;
        let answerData;
        let distractors = [];

        if (level === 1) {
            // Simple rotation or size change
            for(let i=0; i<2; i++) {
                for(let j=0; j<3; j++) {
                    matrixHTML += `${svgBase}${drawShape(j*45, 0.8, c1)}</svg>`;
                }
            }
            matrixHTML += `${svgBase}${drawShape(0, 0.8, c1)}</svg>${svgBase}${drawShape(45, 0.8, c1)}</svg>`;
            matrixHTML += `<div class="w-16 h-16 inline-flex items-center justify-center border-2 border-dashed border-blue-400 rounded mx-2 bg-blue-50 text-blue-400 text-2xl font-bold">?</div>`;
            
            answerData = `${svgBase}${drawShape(90, 0.8, c1)}</svg>`;
            distractors = [
                `${svgBase}${drawShape(135, 0.8, c1)}</svg>`,
                `${svgBase}${drawShape(90, 0.5, c1)}</svg>`,
                `${svgBase}${drawShape(0, 0.8, c2)}</svg>`
            ];
        } else {
            // Complex multi-variable (Size + Color + Rotation)
            for(let i=0; i<2; i++) {
                matrixHTML += `${svgBase}${drawShape(0, 0.5, c1)}</svg>${svgBase}${drawShape(45, 0.7, c2)}</svg>${svgBase}${drawShape(90, 0.9, c1)}</svg>`;
            }
            matrixHTML += `${svgBase}${drawShape(0, 0.5, c1)}</svg>${svgBase}${drawShape(45, 0.7, c2)}</svg>`;
            matrixHTML += `<div class="w-16 h-16 inline-flex items-center justify-center border-2 border-dashed border-blue-400 rounded mx-2 bg-blue-50 text-blue-400 text-2xl font-bold">?</div>`;
            
            answerData = `${svgBase}${drawShape(90, 0.9, c1)}</svg>`;
            // Engineered errors: wrong color, wrong size, wrong rotation
            distractors = [
                `${svgBase}${drawShape(90, 0.9, c2)}</svg>`,
                `${svgBase}${drawShape(45, 0.9, c1)}</svg>`,
                `${svgBase}${drawShape(90, 0.5, c1)}</svg>`
            ];
        }
        matrixHTML += `</div>`;

        let options = [...distractors, answerData].sort(() => Math.random() - 0.5);

        return {
            promptHTML: matrixHTML,
            options: options,
            answer: answerData,
            isHTMLOption: true
        };
    }
};

// --- RENDER LOGIC ---

function render() {
    appDiv.className = "w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px] flex flex-col relative fade-in";
    
    switch (state.phase) {
        case 'setup': renderSetup(); break;
        case 'intro_gf': renderIntroGf(); break;
        case 'gf_test': renderGfTest(); break;
        case 'intro_wm': renderIntroWm(); break;
        case 'wm_test': renderWmTest(); break;
        case 'results': renderResults(); break;
    }
}

function renderSetup() {
    appDiv.innerHTML = `
        <div class="p-10 flex-1 flex flex-col justify-center items-center text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-brain text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4">Clinical Cognitive Assessment</h1>
            <p class="text-slate-500 mb-8 max-w-lg">This professional-grade screening measures Fluid Reasoning (Gf) and Working Memory (Gwm). To provide accurate normative scoring, please enter the subject's chronological age.</p>
            
            <div class="bg-slate-50 p-6 rounded-xl border w-full max-w-md">
                <label class="block text-sm font-semibold text-slate-700 mb-2 text-left">Subject's Age (Years)</label>
                <input type="number" id="ageInput" min="6" max="99" value="10" class="w-full p-3 border rounded-lg mb-6 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                
                <button onclick="startAssessment()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition shadow-lg">
                    Begin Assessment <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
            <p class="text-xs text-slate-400 mt-6 max-w-sm"><i class="fa-solid fa-shield-halved mr-1"></i> COPPA Compliant: 100% Client-side execution. Zero data is transmitted or stored.</p>
        </div>
    `;
}

function startAssessment() {
    const age = parseInt(document.getElementById('ageInput').value);
    if(age < 6 || age > 99) return alert("Age must be between 6 and 99");
    state.ageMonths = age * 12;
    state.phase = 'intro_gf';
    render();
}

function renderIntroGf() {
    appDiv.innerHTML = `
        <div class="p-10 flex-1 flex flex-col justify-center items-center text-center">
            <h2 class="text-3xl font-bold text-slate-800 mb-4">Phase 1: Fluid Reasoning</h2>
            <p class="text-lg text-slate-600 mb-8 max-w-lg">Identify the underlying logical rules in sequences and spatial matrices. This section adapts to your ability.</p>
            <ul class="text-left text-slate-600 mb-10 space-y-4">
                <li><i class="fa-solid fa-stopwatch text-blue-500 mr-2"></i> Speed and accuracy are both measured.</li>
                <li><i class="fa-solid fa-arrow-trend-up text-blue-500 mr-2"></i> Difficulty will adjust automatically.</li>
                <li><i class="fa-solid fa-pen-ruler text-blue-500 mr-2"></i> Max 20 questions to prevent fatigue.</li>
            </ul>
            <button onclick="startGfTest()" class="bg-blue-600 text-white font-bold py-3 px-10 rounded-lg hover:bg-blue-700 transition shadow-lg text-lg">
                Start Phase 1
            </button>
        </div>
    `;
}

function startGfTest() {
    state.phase = 'gf_test';
    generateNextGfQuestion();
}

function generateNextGfQuestion() {
    if (state.gf.questionCount >= state.gf.maxQuestions) {
        state.phase = 'intro_wm';
        render();
        return;
    }

    // Pseudo-Adaptive Routing (CAT)
    if (state.gf.consecutivePass >= 2 && state.gf.level < 3) {
        state.gf.level++;
        state.gf.consecutivePass = 0;
    } else if (state.gf.consecutiveFail >= 2 && state.gf.level > 1) {
        state.gf.level--;
        state.gf.consecutiveFail = 0;
    }

    const type = Math.random() > 0.5 ? 'sequence' : 'matrix';
    state.gf.currentQuestion = generators[type](state.gf.level);
    state.gf.currentQuestionStart = Date.now();
    
    render();
}

// BUGFIX: Passing index rather than raw HTML strings to avoid DOM attribute injection issues
function handleGfAnswer(selectedIndex) {
    const selected = state.gf.currentQuestion.options[selectedIndex];
    const timeTaken = Date.now() - state.gf.currentQuestionStart;
    const isCorrect = selected === state.gf.currentQuestion.answer;

    state.gf.history.push({
        level: state.gf.level,
        correct: isCorrect,
        timeMs: timeTaken
    });

    if (isCorrect) {
        state.gf.consecutivePass++;
        state.gf.consecutiveFail = 0;
    } else {
        state.gf.consecutiveFail++;
        state.gf.consecutivePass = 0;
    }

    state.gf.questionCount++;
    generateNextGfQuestion();
}

function renderGfTest() {
    const progress = (state.gf.questionCount / state.gf.maxQuestions) * 100;
    const q = state.gf.currentQuestion;

    appDiv.innerHTML = `
        <div class="h-2 w-full bg-slate-100">
            <div class="h-full bg-blue-500 transition-all duration-300" style="width: ${progress}%"></div>
        </div>
        <div class="p-6 border-b flex justify-between items-center text-slate-500 font-semibold text-sm">
            <span>Phase 1: Fluid Logic</span>
            <span>Item ${state.gf.questionCount + 1} / ${state.gf.maxQuestions}</span>
            <span class="flex items-center gap-1">Difficulty <span class="flex gap-1">${'<div class="w-2 h-2 rounded-full bg-blue-500"></div>'.repeat(state.gf.level)}${'<div class="w-2 h-2 rounded-full bg-slate-200"></div>'.repeat(3 - state.gf.level)}</span></span>
        </div>
        <div class="flex-1 p-10 flex flex-col items-center justify-center">
            <div class="mb-12 w-full flex justify-center">
                ${q.promptHTML}
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-3xl">
                ${q.options.map((opt, i) => `
                    <button onclick="handleGfAnswer(${i})" class="p-6 bg-white border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition flex items-center justify-center text-2xl font-bold shadow-sm">
                        ${q.isHTMLOption ? opt : opt}
                    </button>
                `).join('')}
            </div>
        </div>
    `;
}

function renderIntroWm() {
    appDiv.innerHTML = `
        <div class="p-10 flex-1 flex flex-col justify-center items-center text-center">
            <div class="w-20 h-20 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-table-cells text-4xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-4">Phase 2: Working Memory</h2>
            <p class="text-lg text-slate-600 mb-8 max-w-lg">Observe the sequence of flashing blocks and repeat it by tapping them in the exact same order.</p>
            <ul class="text-left text-slate-600 mb-10 space-y-4">
                <li><i class="fa-solid fa-plus text-purple-500 mr-2"></i> The sequence gets longer as you succeed.</li>
                <li><i class="fa-solid fa-xmark text-purple-500 mr-2"></i> Two mistakes at the same length ends the phase.</li>
            </ul>
            <button onclick="startWmTest()" class="bg-purple-600 text-white font-bold py-3 px-10 rounded-lg hover:bg-purple-700 transition shadow-lg text-lg">
                Start Phase 2
            </button>
        </div>
    `;
}

function startWmTest() {
    state.phase = 'wm_test';
    generateWmSequence();
}

function generateWmSequence() {
    state.wm.sequence = [];
    state.wm.userIndex = 0;
    for(let i=0; i<state.wm.currentLength; i++) {
        state.wm.sequence.push(Math.floor(Math.random() * 9));
    }
    render();
    setTimeout(playWmSequence, 1000);
}

async function playWmSequence() {
    state.wm.isFlashing = true;
    render(); // Update UI to disable clicks
    
    for(let i=0; i<state.wm.sequence.length; i++) {
        const tileIdx = state.wm.sequence[i];
        const tile = document.getElementById(`wm-tile-${tileIdx}`);
        
        await new Promise(r => setTimeout(r, 400)); // gap
        tile.classList.add('bg-purple-500', 'scale-95', 'shadow-inner');
        tile.classList.remove('bg-slate-100');
        
        await new Promise(r => setTimeout(r, 600)); // flash duration
        tile.classList.remove('bg-purple-500', 'scale-95', 'shadow-inner');
        tile.classList.add('bg-slate-100');
    }
    
    state.wm.isFlashing = false;
    render(); // Enable clicks
}

function handleWmClick(idx) {
    if (state.wm.isFlashing) return;

    // Visual feedback
    const tile = document.getElementById(`wm-tile-${idx}`);
    tile.classList.add('bg-purple-200');
    setTimeout(() => tile.classList.remove('bg-purple-200'), 200);

    if (idx === state.wm.sequence[state.wm.userIndex]) {
        // Correct tap
        state.wm.userIndex++;
        if (state.wm.userIndex === state.wm.sequence.length) {
            // Sequence completed successfully
            state.wm.maxScore = state.wm.currentLength;
            state.wm.currentLength++;
            state.wm.failsAtCurrentLength = 0;
            
            // Show success overlay temporarily
            const overlay = document.getElementById('wm-status');
            overlay.innerHTML = '<i class="fa-solid fa-check text-green-500 text-5xl"></i>';
            
            setTimeout(generateWmSequence, 1000);
        }
    } else {
        // Incorrect tap
        state.wm.failsAtCurrentLength++;
        const overlay = document.getElementById('wm-status');
        overlay.innerHTML = '<i class="fa-solid fa-xmark text-red-500 text-5xl"></i>';

        if (state.wm.failsAtCurrentLength >= 2) {
            setTimeout(() => {
                state.phase = 'results';
                render();
            }, 1500);
        } else {
            setTimeout(generateWmSequence, 1500);
        }
    }
}

function renderWmTest() {
    appDiv.innerHTML = `
        <div class="p-6 border-b flex justify-between items-center text-slate-500 font-semibold text-sm">
            <span>Phase 2: Working Memory (Corsi)</span>
            <span>Sequence Length: ${state.wm.currentLength}</span>
        </div>
        <div class="flex-1 p-10 flex flex-col items-center justify-center relative">
            
            <div id="wm-status" class="absolute inset-0 pointer-events-none flex items-center justify-center z-10 opacity-80"></div>
            
            <div class="mb-8 text-center h-8 text-slate-600 font-medium">
                ${state.wm.isFlashing ? 'Memorize the sequence...' : 'Repeat the sequence!'}
            </div>

            <div class="grid grid-cols-3 gap-4 w-full max-w-sm mx-auto">
                ${[0,1,2,3,4,5,6,7,8].map(i => `
                    <div id="wm-tile-${i}" 
                         onclick="handleWmClick(${i})"
                         class="wm-tile aspect-square bg-slate-100 rounded-xl border-2 border-slate-200 shadow-sm cursor-pointer hover:border-purple-300 ${state.wm.isFlashing ? 'pointer-events-none' : ''}">
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

// --- SCORING & RESULTS ALGORITHMS ---

function calculateScores() {
    // 1. Fluid Intelligence (Gf) Raw Score
    let gfRaw = 0;
    let fastAnswers = 0;
    
    state.gf.history.forEach(item => {
        if (item.correct) {
            // Weighted by IRT level
            gfRaw += item.level * 2; 
            if (item.timeMs < 4000) fastAnswers++;
        }
    });

    // 2. Working Memory (Gwm) Raw Score
    let wmRaw = state.wm.maxScore * 3;

    // 3. Total Raw Score
    let totalRaw = gfRaw + wmRaw;

    // 4. Age-Stratified Norming (Mathematical Approximation)
    // In true clinical settings, this references a massive norming table.
    // We approximate: Base expected score increases with age.
    const ageYears = state.ageMonths / 12;
    // Assume peak fluid intelligence/working memory combo around age 22, plateau, then slight decline.
    // This is a highly simplified heuristic for demonstration.
    let expectedRawScore;
    if (ageYears <= 16) {
        expectedRawScore = 15 + (ageYears * 2.5); // Steep learning curve
    } else if (ageYears <= 45) {
        expectedRawScore = 55; // Peak plateau
    } else {
        expectedRawScore = 55 - ((ageYears - 45) * 0.2); // Slow decline
    }

    // Standard Deviation calculation (Mean = 100, SD = 15)
    // IQ = 100 + ((Raw - Expected) / StandardError) * 15
    const standardError = 12; // Estimated spread
    let estimatedIQ = 100 + ((totalRaw - expectedRawScore) / standardError) * 15;
    
    // Clamp to realistic bounds
    estimatedIQ = Math.max(55, Math.min(145, Math.round(estimatedIQ)));

    // Sub-indices percentiles (Approximate)
    const gfPercentile = Math.round((gfRaw / (state.gf.maxQuestions * 3)) * 99);
    const wmPercentile = Math.round(Math.min(99, (state.wm.maxScore / 9) * 99));

    return { iq: estimatedIQ, gfPercentile, wmPercentile, speed: fastAnswers };
}

function renderResults() {
    const scores = calculateScores();
    
    let classification = "Average";
    if (scores.iq >= 130) classification = "Very Superior";
    else if (scores.iq >= 120) classification = "Superior";
    else if (scores.iq >= 110) classification = "High Average";
    else if (scores.iq < 90) classification = "Low Average";
    else if (scores.iq < 80) classification = "Borderline";

    appDiv.innerHTML = `
        <div class="bg-slate-800 text-white p-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 flex items-center justify-center">
                <i class="fa-solid fa-chart-network text-9xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 relative z-10">Clinical Cognitive Profile</h2>
            <p class="text-slate-300 relative z-10">Normative Assessment Complete</p>
        </div>
        
        <div class="flex-1 p-8 grid md:grid-cols-2 gap-8 bg-slate-50">
            <!-- Global Score -->
            <div class="bg-white rounded-2xl shadow-sm border p-6 flex flex-col items-center justify-center text-center">
                <h3 class="text-sm uppercase tracking-wider text-slate-400 font-bold mb-4">Estimated FSIQ</h3>
                <div class="text-7xl font-black text-blue-600 mb-2">${scores.iq}</div>
                <div class="inline-block px-4 py-1 rounded-full bg-blue-50 text-blue-700 font-semibold text-sm">
                    ${classification}
                </div>
                <p class="text-xs text-slate-400 mt-4 max-w-xs">Age-adjusted composite score (Chronological Age: ${state.ageMonths/12} yrs)</p>
            </div>

            <!-- Sub-Indices -->
            <div class="flex flex-col gap-4">
                <div class="bg-white rounded-xl shadow-sm border p-5 flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl mr-4">
                        <i class="fa-solid fa-puzzle-piece"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-700">Fluid Reasoning (Gf)</h4>
                        <div class="w-full bg-slate-100 rounded-full h-2 mt-2">
                            <div class="bg-emerald-500 h-2 rounded-full" style="width: ${Math.max(5, scores.gfPercentile)}%"></div>
                        </div>
                    </div>
                    <div class="ml-4 font-mono font-bold text-slate-600">${Math.max(1, scores.gfPercentile)}th ptile</div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border p-5 flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-purple-100 text-purple-600 flex items-center justify-center text-xl mr-4">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-700">Working Memory (Gwm)</h4>
                        <div class="w-full bg-slate-100 rounded-full h-2 mt-2">
                            <div class="bg-purple-500 h-2 rounded-full" style="width: ${Math.max(5, scores.wmPercentile)}%"></div>
                        </div>
                    </div>
                    <div class="ml-4 font-mono font-bold text-slate-600">${Math.max(1, scores.wmPercentile)}th ptile</div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border p-5 flex items-center">
                    <div class="w-12 h-12 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center text-xl mr-4">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-700">Processing Speed (Gs)</h4>
                        <p class="text-sm text-slate-500 mt-1">${scores.speed} rapid correct responses</p>
                    </div>
                </div>
            </div>
        </div>
